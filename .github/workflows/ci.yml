name: tests
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tz: ["UTC", "Europe/Madrid", "America/Los_Angeles"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run suite (TZ=${{ matrix.tz }})
        run: TZ="${{ matrix.tz }}" node test/test.js
