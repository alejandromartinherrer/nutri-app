<title>Menú de la semana</title>
<style>
:root{
	--bg:#F4F6F3; --card:#FFFFFF; --ink:#1E2A24; --muted:#6B756F;
	--line:#E4E9E4; --line2:#EEF2EE;
	--aub:#2E7D5B; --aub-2:#246B4D; --aub-soft:#E2F0E9;
	--herb:#2F7D58; --herb-soft:#E5F0EA;
	--amber:#B5642B; --amber-soft:#F7EADB;
	--red:#B33A3A;
	--m-nosotros:#2F6F8F; --m-noah:#3E7C5A; --m-iria:#C2557A;
	--r:14px; --r-sm:10px;
	--sh:0 1px 2px rgba(36,27,46,.06),0 6px 18px rgba(36,27,46,.06);
	--sh-pop:0 8px 40px rgba(36,27,46,.22);
	--ff:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
	font-family:var(--ff); color:var(--ink); background:var(--bg);
	font-size:15px; line-height:1.4;
	padding-bottom:calc(64px + env(safe-area-inset-bottom));
	-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px;color:inherit}
.app{max-width:520px;margin:0 auto;min-height:100vh}

/* ---------- top bar ---------- */
.top{
	position:sticky;top:0;z-index:30;
	background:var(--aub);color:#fff;
	padding:calc(env(safe-area-inset-top) + 10px) 14px 12px;
	box-shadow:0 2px 12px rgba(36,27,46,.18);
}
.top-row{display:flex;align-items:center;gap:8px}
.top h1{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin:0;opacity:.75;flex:1}
.icon-btn{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.14);font-size:17px;line-height:1;border:0;padding:0;color:inherit;font-family:inherit;cursor:pointer}
.icon-btn:active{background:rgba(255,255,255,.28)}
.wk{display:flex;align-items:center;gap:10px;margin-top:10px}
.wk-nav{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:20px;font-weight:600}
.wk-nav:active{background:rgba(255,255,255,.28)}
.wk-label{flex:1;text-align:center}
.wk-label .r1{font-size:19px;font-weight:700;letter-spacing:-.01em}
.wk-label .r2{font-size:12px;opacity:.7;margin-top:1px}
.surprise{
	margin-top:11px;width:100%;height:46px;border-radius:13px;
	background:linear-gradient(180deg,#FFE27A,#F7C948);color:#3a2a08;
	font-weight:800;font-size:15px;letter-spacing:.01em;
	display:flex;align-items:center;justify-content:center;gap:8px;
	box-shadow:0 2px 0 #d9a916,0 8px 20px rgba(0,0,0,.18);
}
.surprise:active{transform:translateY(1px);box-shadow:0 1px 0 #d9a916}
.icon-btn.wa{background:#25D366}
.icon-btn.wa:active{background:#1da851}
.icon-btn svg{width:19px;height:19px;display:block}

/* ---------- views ---------- */
.view{padding:14px 14px 24px}
.view-title{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:2px 2px 12px}
.hint{color:var(--muted);font-size:13px;margin:0 2px 14px}

/* ---------- day card ---------- */
.day{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.day-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--line2)}
.day-head.collapsed{border-bottom:none}
.day-dow{font-size:16px;font-weight:800;text-transform:capitalize;letter-spacing:-.01em}
.day-date{font-size:12px;color:var(--muted)}
.day-today{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--aub);padding:3px 7px;border-radius:20px}
.day-fill{flex:1}
.day-mini{display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.chev{color:var(--muted);font-size:13px;transition:transform .18s}
.chev.up{transform:rotate(180deg)}
.slots{padding:4px 0}
.slot{padding:9px 14px;border-top:1px solid var(--line2)}
.slot:first-child{border-top:none}
.slot-l{font-size:10.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--aub-2);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.slot-l .sl-act{margin-left:auto;color:var(--muted);font-weight:700;letter-spacing:.02em;text-transform:none;font-size:12px}
.rows{display:flex;flex-direction:column;gap:5px}
.row-all,.row-m{display:flex;align-items:center;gap:9px;min-height:30px;border-radius:var(--r-sm);padding:5px 8px;background:var(--line2)}
.row-all{background:var(--aub-soft)}
.tag{font-size:10px;font-weight:800;letter-spacing:.04em;padding:2px 8px;border-radius:20px;color:#fff;white-space:nowrap;flex-shrink:0}
.tag.all{background:var(--aub)}
.tag.m{min-width:64px;text-align:center}
.dish{flex:1;font-size:14px;white-space:pre-wrap;line-height:1.25}
.dish.empty{color:var(--muted);font-weight:600}
.dish .frozen,.dish .fridge{font-size:11px;margin-left:6px;color:var(--herb);font-weight:700;white-space:nowrap}
.dish .fridge{color:var(--amber)}
.away{color:var(--muted);font-size:13px;font-weight:700}
.add-slot{color:var(--aub-2);font-weight:800;font-size:13px;padding:6px 8px}

/* ---------- pantry / lists ---------- */
.sec{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.sec-h{display:flex;align-items:center;gap:8px;padding:12px 14px 10px}
.sec-h h3{margin:0;font-size:15px;font-weight:800;letter-spacing:-.01em}
.sec-h .sub{font-size:12px;color:var(--muted);font-weight:600}
.sec-h .add-x{margin-left:auto;color:var(--aub);font-weight:800;font-size:13px}
.it{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--line2)}
.it .star{font-size:16px;width:24px;text-align:center;flex-shrink:0;color:#d8cfd5}
.it .star.on{color:#E8A93B}
.it .nm{flex:1;font-size:14.5px}
.it .nm small{color:var(--muted);font-weight:600}
.it .used{font-size:11px;color:var(--herb);font-weight:700}
.it .pri{font-size:10px;font-weight:800;letter-spacing:.04em;color:var(--amber);background:var(--amber-soft);padding:2px 7px;border-radius:20px}
.stepper{display:flex;align-items:center;gap:0;background:var(--bg);border-radius:9px;overflow:hidden;flex-shrink:0}
.stepper button{width:30px;height:30px;font-size:18px;font-weight:700;color:var(--aub);display:grid;place-items:center}
.stepper button:active{background:var(--aub-soft)}
.stepper .q{min-width:30px;text-align:center;font-weight:800;font-size:14px}
.del{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#c6bcc4;font-size:15px;flex-shrink:0}
.del:active{background:#f6eef3;color:var(--red)}
.check{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;font-size:14px;color:#fff}
.check.on{background:var(--herb);border-color:var(--herb)}
.it.done .nm{text-decoration:line-through;color:var(--muted)}
.empty-msg{padding:16px 14px;color:var(--muted);font-size:13px;text-align:center}

/* ideas */
.tabs{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 13px;border-radius:20px;background:var(--card);box-shadow:var(--sh);font-size:13px;font-weight:700;white-space:nowrap;color:var(--muted)}
.tab.on{background:var(--aub);color:#fff}
.fchips{display:flex;gap:6px;padding:0 14px 12px;overflow-x:auto;flex-wrap:nowrap}
.fchip{padding:6px 11px;border-radius:18px;background:var(--card);box-shadow:var(--sh);font-size:12px;font-weight:700;white-space:nowrap;color:var(--muted)}
.fchip.on{background:var(--herb);color:#fff}
.idea{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--line2)}
.idea .nm{flex:1;font-size:14.5px;font-weight:600}
.idea .ti{font-size:10.5px;font-weight:800;color:var(--aub-2);background:var(--aub-soft);padding:3px 8px;border-radius:20px;white-space:nowrap}

/* ---------- bottom nav ---------- */
.nav{
	position:fixed;left:0;right:0;bottom:0;z-index:30;
	background:rgba(255,255,255,.92);backdrop-filter:saturate(160%) blur(14px);
	border-top:1px solid var(--line);
	display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
	max-width:520px;margin:0 auto;
}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--muted);font-size:10.5px;font-weight:700;border-radius:12px}
.nav button .ic{font-size:20px;line-height:1}
.nav button.on{color:var(--aub)}
.nav .badge{position:absolute;transform:translate(14px,-6px);background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:10px;display:grid;place-items:center;padding:0 4px}

/* ---------- modal / sheet ---------- */
.scrim{position:fixed;inset:0;z-index:40;background:rgba(36,27,46,.42);opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{
	position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:520px;margin:0 auto;
	background:var(--card);border-radius:20px 20px 0 0;
	box-shadow:var(--sh-pop);
	transform:translateY(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);
	max-height:88vh;display:flex;flex-direction:column;
	padding-bottom:env(safe-area-inset-bottom);
}
.sheet.show{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:4px;background:#e0d8de;margin:9px auto 4px}
.sheet-h{padding:4px 16px 10px;display:flex;align-items:flex-end;gap:8px;border-bottom:1px solid var(--line2)}
.sheet-h .t1{font-size:18px;font-weight:800;letter-spacing:-.01em}
.sheet-h .t2{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}
.sheet-h .x{margin-left:auto;width:32px;height:32px;border-radius:9px;background:var(--bg);display:grid;place-items:center;font-size:16px;color:var(--muted)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 18px}
.field{width:100%;height:44px;border:1.5px solid var(--line);border-radius:11px;padding:0 13px;background:var(--bg);outline:none}
.field:focus{border-color:var(--aub);background:#fff}
.lab{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 2px 7px}
.toggle{display:flex;align-items:center;gap:10px;background:var(--aub-soft);border-radius:12px;padding:11px 13px;margin-bottom:4px}
.toggle .tl{flex:1;font-weight:700;font-size:14px}
.sw{width:48px;height:28px;border-radius:16px;background:#cdbfca;position:relative;transition:background .18s;flex-shrink:0}
.sw.on{background:var(--aub)}
.sw::after{content:"";position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on::after{left:23px}
.pick-list{display:flex;flex-direction:column;gap:1px;margin-top:4px}
.pick{display:flex;align-items:center;gap:10px;padding:11px 4px;border-top:1px solid var(--line2);text-align:left;width:100%}
.pick .nm{flex:1;font-size:15px;font-weight:600}
.pick .ti{font-size:10.5px;font-weight:800;color:var(--aub-2);background:var(--aub-soft);padding:3px 8px;border-radius:20px;white-space:nowrap}
.inv-row{display:flex;gap:7px;overflow-x:auto;padding:2px 0 4px;-webkit-overflow-scrolling:touch}
.inv-chip{display:flex;align-items:center;gap:6px;padding:9px 12px;border-radius:12px;background:var(--herb-soft);color:#235c40;font-weight:700;font-size:13px;white-space:nowrap;border:1.5px solid transparent}
.inv-chip.fridge{background:var(--amber-soft);color:#6b4309}
.inv-chip:active{border-color:var(--herb)}
.inv-chip .q{font-size:11px;opacity:.7}
.act-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;height:46px;border-radius:12px;font-weight:800;font-size:14px;display:grid;place-items:center;border:1.5px solid var(--line)}
.btn.ghost{background:#fff;color:var(--ink)}
.btn.warn{background:#fff;color:var(--amber);border-color:var(--amber-soft)}
.btn.danger{background:#fff;color:var(--red);border-color:#f0dada}
.btn.prim{background:var(--aub);color:#fff;border-color:var(--aub)}
.btn:active{transform:translateY(1px)}
.menu-item{display:flex;align-items:center;gap:12px;padding:14px 4px;border-top:1px solid var(--line2);font-size:15px;font-weight:600;width:100%;text-align:left}
.menu-item .mi{font-size:18px;width:24px;text-align:center}
.menu-item.danger{color:var(--red)}
.appear{padding:6px 4px 14px;border-bottom:1px solid var(--line2)}
.appear .lbl{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.sw-row{display:flex;gap:12px}
.sw-th{flex:1;min-width:0;border:2px solid var(--line);border-radius:13px;padding:9px 6px 8px;background:var(--card);display:flex;flex-direction:column;align-items:center;gap:7px}
.sw-th.on{border-color:var(--aub)}
.sw-dot{width:34px;height:34px;border-radius:50%;position:relative;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.sw-dot::after{content:"";position:absolute;right:-1px;bottom:-1px;width:15px;height:15px;border-radius:50%;border:2px solid var(--card)}
.sw-nm{font-size:11px;font-weight:700;color:var(--ink);text-align:center;line-height:1.1}
.sw-th.on .sw-nm{color:var(--aub)}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(80px + env(safe-area-inset-bottom));transform:translate(-50%,20px);z-index:60;background:var(--ink);color:#fff;padding:11px 16px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-pop);opacity:0;pointer-events:none;transition:all .22s;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:3px solid var(--aub-2);outline-offset:2px}
.ver-foot{text-align:center;font-size:11px;color:var(--muted);padding:10px 0 2px}
.about-b{font-size:13.5px;line-height:1.5;color:var(--ink)}
.about-b p{margin:0 0 10px}
.about-b b{font-weight:800}

/* shopping send-to-greengrocer action */
.shop-actions{display:flex;gap:8px;margin-top:4px}
.shop-actions .btn{flex:1}
.btn.wa-btn{background:#25D366;color:#fff;border-color:#25D366;display:flex;align-items:center;justify-content:center;gap:7px}
.btn.wa-btn svg{width:17px;height:17px;fill:#fff}
.btn.wa-btn:active{background:#1da851}

/* meal composer (1º + 2º) */
.composer{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.cm-slot{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:10px 12px;min-height:46px}
.cm-slot.on{border-color:var(--aub);background:var(--aub-soft)}
.cm-k{font-weight:800;font-size:12px;color:var(--aub);background:var(--aub-soft);border-radius:7px;padding:3px 8px;flex:none}
.cm-slot.on .cm-k{background:var(--card)}
.cm-v{flex:1;font-size:14px;font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-v.ph{color:var(--muted);font-weight:500}
.cm-x{flex:none;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--line2);color:var(--muted);font-size:12px}

/* macros view */
.mc-note{font-size:12px;color:var(--muted);line-height:1.45;background:var(--aub-soft);border-radius:12px;padding:10px 12px;margin-bottom:12px}
.mc-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--sh)}
.mc-top{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.mc-name{font-size:16px;font-weight:800}
.mc-name .tag{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:middle}
.mc-sub{font-size:11.5px;color:var(--muted);margin-left:auto;font-weight:600}
.mc-kcal{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1}
.mc-kcal small{font-size:13px;font-weight:600;color:var(--muted);margin-left:5px;letter-spacing:0}
.mc-week{font-size:12px;color:var(--muted);margin-top:2px}
.mc-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin:12px 0 8px;background:var(--line2)}
.mc-bar i{display:block;height:100%}
.mc-macros{display:flex;gap:14px;font-size:12.5px;font-weight:600}
.mc-macros .mm{display:flex;align-items:center;gap:6px}
.mc-macros .mm .d{width:9px;height:9px;border-radius:2px}
.mc-macros .mm b{font-weight:800}
.mc-empty{font-size:13px;color:var(--muted)}
</style>
</head>

function CurThemeId(){return (state&&THEMES[state.theme])?state.theme:"fresco"}
function ApplyTheme(){
	const th=THEMES[CurThemeId()], root=document.documentElement;
	Object.entries(th.vars).forEach(([k,v])=>root.style.setProperty(k,v));
	// reset shadows to default when leaving a theme that overrode them
	if(!th.vars["--sh"]){root.style.removeProperty("--sh");root.style.removeProperty("--sh-pop");}
	const meta=document.getElementById("metaTheme");
	if(meta) meta.setAttribute("content",th.vars["--aub"]);
}

function BuildManifest(){
	try{

		const m={name:"Menú de la semana",short_name:"Menú",start_url:".",
			display:"standalone",background_color:"#F4F6F3",

			icons:[{src:icon,sizes:"180x180",type:"image/png",purpose:"any"}]};
		const url=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/manifest+json"}));
		let l=document.querySelector('link[rel="manifest"]');
		if(!l){l=document.createElement("link");l.rel="manifest";document.head.appendChild(l);}
		l.href=url;
	}catch(e){/* non-critical */}
}

function Uid(){return Math.random().toString(36).slice(2,9)}
/* Local YYYY-MM-DD. Never round-trip through toISOString() for date-only
   math: it converts to UTC and shifts the day in UTC+ zones (e.g. Madrid). */
function Ymd(d){
	return d.getFullYear() + "-" +
		String(d.getMonth() + 1).padStart(2, "0") + "-" +
		String(d.getDate()).padStart(2, "0");
}
function TodayISO(){return Ymd(new Date())}

function MondayOf(d){
	const dt = (d instanceof Date)? new Date(d): new Date(d+"T00:00:00");
	const wd = (dt.getDay()+6)%7;            // 0=Mon
	dt.setDate(dt.getDate()-wd);
	return Ymd(dt);
}
function AddDays(iso,n){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return Ymd(d)}
function FmtLong(iso){const d=new Date(iso+"T00:00:00");return d.getDate()+" "+["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][d.getMonth()]}

/* ---- load / save (storage is best-effort; never throws) ---- */
function Save(){
	try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){/* in-memory only */}
}
/* Reference data (catalog) is rebuilt from SEED on every boot and never
   trusted from storage; otherwise catalog updates never reach an already
   installed user. Only user data (weeks/inventory/produce/members/theme)
   is persisted. */
function BuildCatalog(){
	return SEED.catalog.map(c=>({
		id:Uid(), name:c.name, tipo:c.tipo, course:c.course,
		kcal:c.kcal, prot:c.prot, carb:c.carb, fat:c.fat,
		estilo:c.estilo, batch:!!c.batch
	}));
}
function ValidState(s){
	return !!(s && s.weeks && Array.isArray(s.members) && s.inventory &&
		s.inventory.frigo && s.inventory.conge && Array.isArray(s.produce));
}
function Load(){
	try{
		const raw = localStorage.getItem(STORE_KEY);
		if(!raw) return false;
		const s = JSON.parse(raw);
		if(!ValidState(s)) return false;   // partial/corrupt -> re-seed
		state = s; return true;
	}catch(e){ return false; }
}

function SeedState(){
	const members = [
		{id:"nosotros",name:"Nosotros",color:"var(--m-nosotros)",factor:1},
		{id:"noah",name:"Noah",color:"var(--m-noah)",factor:0.6},
		{id:"iria",name:"Iria",color:"var(--m-iria)",factor:0.6}
	];
	const catalog = BuildCatalog();
	const today = TodayISO();
	const frigo = SEED.frigo.map(i=>({id:Uid(),name:i.name,qty:i.qty,unit:"",added:today,pri:true}));
	const conge = SEED.conge.map(i=>({id:Uid(),name:i.name,qty:i.qty,unit:"",added:today,pri:false}));
	const produce = SEED.produce.map(p=>({id:Uid(),name:p.name,qty:p.qty,unit:p.unit||"ud",done:false}));
	// build week object from seed
	const weeks = {};
	const wk = BuildWeekFromSeed(SEED.week);
	weeks[wk.monday] = wk;
	return {
		members, catalog,
		inventory:{frigo,conge},
		produce, extras:[],
		weeks, current: wk.monday
	};
}

function BuildWeekFromSeed(seedWeek){
	const monday = MondayOf(seedWeek[0].date);
	const days = [];
	for(let i=0;i<7;i++){
		const date = AddDays(monday,i);
		const src = seedWeek.find(d=>d.date===date);
		const slots = {};
		SLOTS.forEach(s=>{
			slots[s] = {};
			MEMBER_IDS.forEach(m=>{
				const dish = src && src.slots[s] ? (src.slots[s][m]||"") : "";
				slots[s][m] = {dish:dish||"",invId:null,away:false};
			});
		});
		days.push({date,slots});
	}
	return {monday,days};
}

function EnsureWeek(monday){
	if(state.weeks[monday]) return state.weeks[monday];
	const days = [];
	for(let i=0;i<7;i++){
		const date = AddDays(monday,i);
		const slots = {};
		SLOTS.forEach(s=>{slots[s]={};state.members.forEach(m=>{slots[s][m.id]=BlankCell()})});
		days.push({date,slots});
	}
	state.weeks[monday] = {monday,days};
	return state.weeks[monday];
}

function CurWeek(){return EnsureWeek(state.current)}
function Member(id){return state.members.find(m=>m.id===id)}

/* ============================ HELPERS ============================ */
function InvById(id){
	if(!id) return null;
	return state.inventory.frigo.find(i=>i.id===id)||state.inventory.conge.find(i=>i.id===id)||null;
}
function InvLoc(id){
	if(state.inventory.frigo.some(i=>i.id===id)) return "frigo";
	if(state.inventory.conge.some(i=>i.id===id)) return "conge";
	return null;
}
// distinct planned dishes this week with no inventory backing -> need shopping
function DishesNeedingShopping(){
	const wk = CurWeek();
	const all = new Map();          // key -> display name
	const covered = new Set();      // dish keys backed by any inventory link
	wk.days.forEach(d=>SLOTS.forEach(s=>{
		const slot=d.slots[s];
		state.members.forEach(m=>{
			const c=slot[m.id];
			if(c && c.dish && !c.away){
				const key=c.dish.trim().toLowerCase();
				if(!all.has(key)) all.set(key,c.dish.trim());
				if(c.invId) covered.add(key);
			}
		});
	}));
	const out=[];
	all.forEach((name,key)=>{ if(!covered.has(key)) out.push(name) });
	return out.sort((a,b)=>a.localeCompare(b,"es"));
}
function CountPlanned(){
	const wk=CurWeek(); let n=0;
	wk.days.forEach(d=>SLOTS.forEach(s=>state.members.forEach(m=>{
		const c=d.slots[s][m.id]; if(c&&(c.dish||c.away)) n++;
	})));
	return n;
}

function SlotRows(d,dayIdx,slot){
	const cells = state.members.map(m=>({m,c:d.slots[slot][m.id]}));
	const filled = cells.filter(x=>x.c.dish && !x.c.away);
	const allSame = filled.length===state.members.length &&
		filled.every(x=>x.c.dish.trim().toLowerCase()===filled[0].c.dish.trim().toLowerCase());
	let rows="";
	if(allSame){
		rows = `<div class="row-all" data-action="pick" data-d="${dayIdx}" data-s="${slot}" data-all="1">
			<span class="tag all">Todos</span>
			<span class="dish">${DishHtml(filled[0].c)}</span></div>`;
	}else{
		const parts = cells.map(({m,c})=>{
			let inner;
			if(c.away) inner=`<span class="away">🚶 Fuera de casa</span>`;
			else if(c.dish) inner=`<span class="dish">${DishHtml(c)}</span>`;
			else inner=`<span class="dish empty">+ añadir</span>`;
			return `<div class="row-m" data-action="pick" data-d="${dayIdx}" data-s="${slot}" data-m="${m.id}">
				<span class="tag m" style="background:${m.color}">${m.name}</span>${inner}</div>`;
		});
		rows = parts.join("");
	}
	return rows;
}
function DishHtml(c){
	let extra="";
	if(c.invId){
		const loc=InvLoc(c.invId);
		extra = loc==="frigo"?`<span class="fridge">🧊 del frigo</span>`:`<span class="frozen">❄️ del congelador</span>`;
	}
	return escapeHtml(c.dish)+extra;
}
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}

function RenderSemana(){
	const wk=CurWeek(); const today=TodayISO();
	let html="";
	wk.days.forEach((d,i)=>{
		const isToday = d.date===today;
		const collapsed = ui.collapsed[d.date] ?? (d.date<today && !isToday);
		ui.collapsed[d.date]=collapsed;
		const dowName = DOW[i];

/* ============================ RENDER: MACROS ============================ */
/* O(1) name->macros lookup. The catalog is reference data rebuilt only via
   RefreshCatalog(), which is the single invalidation point of this index. */
let _macroIndex = null;
function MacroIndex(){
	if(_macroIndex) return _macroIndex;
	_macroIndex = new Map();
	state.catalog.forEach(c=>{
		if(typeof c.kcal==="number")
			_macroIndex.set(c.name.trim().toLowerCase(),
				{kcal:c.kcal,prot:c.prot,carb:c.carb,fat:c.fat});
	});
	return _macroIndex;
}
function RefreshCatalog(){
	const hidden = new Set(state.hidden||[]);
	state.catalog = BuildCatalog()
		.filter(c=>!hidden.has(c.name.trim().toLowerCase()));
	_macroIndex = null;
}
function DishMacros(name){
	if(!name) return null;
	return MacroIndex().get(name.trim().toLowerCase()) || null;
}
/* a meal cell may hold "1º · 2º"; sum the macros of every recognised part */
function MealMacros(dish){
	if(!dish) return null;
	const parts=dish.split(SEP).map(s=>s.trim()).filter(Boolean);
	const t={kcal:0,prot:0,carb:0,fat:0}; let hit=false;
	parts.forEach(p=>{const m=DishMacros(p); if(m){hit=true;t.kcal+=m.kcal;t.prot+=m.prot;t.carb+=m.carb;t.fat+=m.fat;}});
	return hit?t:null;
}
function MemberWeekMacros(member){
	const wk=CurWeek(); const f=member.factor||1;
	const t={kcal:0,prot:0,carb:0,fat:0}; let counted=0,planned=0;
	wk.days.forEach(d=>["Comida","Cena"].forEach(sl=>{
		const c=d.slots[sl]&&d.slots[sl][member.id];
		if(!c||c.away||!c.dish) return;
		planned++;
		const m=MealMacros(c.dish);
		if(m){counted++;t.kcal+=m.kcal*f;t.prot+=m.prot*f;t.carb+=m.carb*f;t.fat+=m.fat*f;}
	}));
	return {t,counted,planned};
}
function RenderMacros(){
	const days=7;
	const cards=state.members.map(mem=>{
		const {t,counted,planned}=MemberWeekMacros(mem);
		const hex={nosotros:"#2F6F8F",noah:"#3E7C5A",iria:"#C2557A"}[mem.id]||"#2E7D5B";
		if(counted===0){
			return `<div class="mc-card">
				<div class="mc-top"><div class="mc-name"><span class="tag" style="background:${hex}"></span>${mem.name}</div></div>
				<div class="mc-empty">Sin platos del catálogo planificados esta semana.</div></div>`;
		}
		const dayK=Math.round(t.kcal/days);
		const pc=t.prot*4,cc=t.carb*4,fc=t.fat*9,sum=Math.max(1,pc+cc+fc);
		const pp=Math.round(pc/sum*100),cp=Math.round(cc/sum*100),fp=Math.max(0,100-pp-cp);
		const sub=mem.factor!==1?`ración ${Math.round(mem.factor*100)} %`:"por adulto";
		return `<div class="mc-card">
			<div class="mc-top">
				<div class="mc-name"><span class="tag" style="background:${hex}"></span>${mem.name}</div>
				<div class="mc-sub">${sub}</div>
			</div>
			<div class="mc-kcal">${dayK}<small>kcal/día</small></div>
			<div class="mc-week">${Math.round(t.kcal).toLocaleString("es-ES")} kcal en la semana · ${counted}/${planned} platos con datos</div>
			<div class="mc-bar">
				<i style="width:${pp}%;background:#4C8BB0"></i>
				<i style="width:${cp}%;background:#E0A93B"></i>
				<i style="width:${fp}%;background:#CC6666"></i>
			</div>
			<div class="mc-macros">
				<span class="mm"><span class="d" style="background:#4C8BB0"></span>Proteína <b>${Math.round(t.prot/days)} g</b></span>
				<span class="mm"><span class="d" style="background:#E0A93B"></span>Hidratos <b>${Math.round(t.carb/days)} g</b></span>
				<span class="mm"><span class="d" style="background:#CC6666"></span>Grasa <b>${Math.round(t.fat/days)} g</b></span>
			</div>
		</div>`;
	}).join("");
	return `<div class="view-title">Macros por persona</div>
		<div class="mc-note">Estimación por ración estándar (no es medición). Suma <b>comida y cena</b> del catálogo; desayunos/almuerzos rutinarios y platos escritos a mano no cuentan. «Nosotros» = por adulto; Noah e Iria al 60 %. Medias por día sobre 7 días.</div>
		${cards}`;
}

function OpenPicker(dayIdx,slot,member,applyAll){
	const course = slot==="Comida"?"comida":(slot==="Cena"?"cena":"todos");
	picker={dayIdx,slot,member:member||null,applyAll:!!applyAll,search:"",course,tipo:null};
	if(slot==="Comida"||slot==="Cena"){
		const cellSlot=CurWeek().days[dayIdx].slots[slot];
		const ref = member? cellSlot[member] : cellSlot[state.members[0].id];
		const parts=(ref&&ref.dish?ref.dish:"").split(SEP).map(s=>s.trim());
		picker.pri=parts[0]||null;
		picker.seg=parts[1]||null;
		picker.invId=(ref&&ref.invId)||null;
		picker.sub="pri";
	}
	RenderPicker(); ShowSheet();
}
function PickerCandidates(){
	let items=state.catalog.slice();
	if(picker.slot==="Comida") items=items.filter(c=>c.course===(picker.sub==="pri"?"primero":"segundo"));
	else if(picker.slot==="Cena") items=items.filter(c=>c.course==="cena");
	// other slots (Desayuno/Almuerzo): all courses
	if(picker.tipo) items=items.filter(c=>c.tipo===picker.tipo);
	if(picker.search){const q=picker.search.toLowerCase();items=items.filter(c=>c.name.toLowerCase().includes(q))}
	items.sort((a,b)=>a.name.localeCompare(b.name,"es"));
	return items;
}

/* assign logic */
function ApplyDish(dish,invId){
	const wk=CurWeek(); const slot=wk.days[picker.dayIdx].slots[picker.slot];
	const targets = picker.applyAll? state.members.map(m=>m.id) : [picker.member];
	let firstInv = invId;     // only first target carries the inv link / decrement
	targets.forEach((mid,idx)=>{
		const link = (idx===0)?firstInv:null;
		slot[mid] = {dish:dish, invId:link, away:false};
	});
	if(invId){
		const it=InvById(invId);
		if(it && it.qty>0){it.qty-=1}  // consume one unit
	}
	const wasAll=picker.applyAll;
	Save(); CloseSheet(); Render();
	Toast(wasAll?"Asignado a todos":"Asignado");
}
function SaveComida(){
	const parts=[picker.pri,picker.seg].filter(Boolean);

}

/* ============================ SURPRISE GENERATOR ============================ */
function Surprise(){
	const wk=CurWeek();
	const byCourse = c=>state.catalog.filter(x=>x.course===c);
	const pri = byCourse("primero"), seg=byCourse("segundo"), cen=byCourse("cena"), noah=byCourse("noah");
	// inventory keyword set for prioritisation
	const invItems=[...state.inventory.frigo,...state.inventory.conge].filter(i=>i.qty>0);
	const invTokens = invItems.map(i=>({id:i.id,toks:Tokens(i.name),pri:i.pri}));
	function invMatch(dish){
		const dt=Tokens(dish.name).concat(Tokens(dish.tipo||""));
		for(const it of invTokens){
			if(it.toks.some(t=>dt.includes(t))) return it;
		}
		return null;
	}
	function pickFor(pool,usedNames,prevTipo){
		if(!pool.length) return null;
		const cand=pool.filter(x=>!usedNames.has(x.name.toLowerCase()));
		const base=cand.length?cand:pool;
		// score: inventory match (+3, +2 extra if priority), different tipo from prev (+1), small noise
		let best=null,bestScore=-1;
		base.forEach(x=>{
			let sc=Math.random()*0.9;
			const im=invMatch(x);
			if(im){sc+=3; if(im.pri) sc+=2}
			if(prevTipo && x.tipo && x.tipo!==prevTipo) sc+=1;
			if(sc>bestScore){bestScore=sc;best=x}
		});
		return best;
	}
	const usedComida=new Set(), usedCena=new Set(), usedNoah=new Set();
	let prevCT=null, prevNT=null, prevNoahT=null;
	let filled=0;
	wk.days.forEach((d,i)=>{
		// COMIDA = 1º + 2º (family)
		fillSlot(d,"Comida",()=>{
			const p=pickFor(pri,usedComida,prevCT);
			if(p){usedComida.add(p.name.toLowerCase()); prevCT=p.tipo;}
			const s=pickFor(seg,usedComida,p?p.tipo:prevCT);
			if(s){usedComida.add(s.name.toLowerCase());}
			const chosen=[p,s].filter(Boolean);
			if(!chosen.length) return null;
			const im=(s&&invMatch(s))||(p&&invMatch(p))||null;
			return {name:chosen.map(x=>x.name).join(SEP), im};
		});
		// CENA – family (single dish)
		fillSlot(d,"Cena",()=>{
			const dish=pickFor(cen,usedCena,prevNT);
			if(!dish) return null; usedCena.add(dish.name.toLowerCase()); prevNT=dish.tipo;
			return {name:dish.name, im:invMatch(dish)};
		});
	});
	// Noah differentiation: if his column has options, give him his own comida when family comida exists
	if(noah.length){
		wk.days.forEach(d=>{
			const slot=d.slots["Comida"]; const c=slot["noah"];
			if(c && c.dish && !c.away){
				const dish=pickFor(noah,usedNoah,prevNoahT);
				if(dish){usedNoah.add(dish.name.toLowerCase());prevNoahT=dish.tipo;
					const im=invMatch(dish);
					slot["noah"]={dish:dish.name,invId:im?im.id:null,away:false};
				}
			}
		});
	}

	function fillSlot(d,slotName,producer){
		const slot=d.slots[slotName];
		// only fill if every member empty (don't overwrite manual work)
		if(state.members.some(m=>slot[m.id].dish||slot[m.id].away)) return;
		const r=producer();           // {name, im} or null
		if(!r) return;
		state.members.forEach((m,idx)=>{
			slot[m.id]={dish:r.name,invId:(idx===0&&r.im)?r.im.id:null,away:false};
		});
		filled++;
	}
	Save(); Render();
	Toast(filled?`Rellenadas ${filled} comidas (huecos vacíos) ✨`:"No había huecos vacíos que rellenar");
}
function Tokens(s){
	return (s||"").toLowerCase()
		.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
		.replace(/[^a-z0-9 ]/g," ").split(/\s+/)
		.filter(w=>w.length>3 && !["con","las","los","una","del","sin","pan"].includes(w));
}

function CopyShop(){

	const prod=state.produce.filter(p=>!p.done);

function CopyText(text){
	if(navigator.clipboard&&navigator.clipboard.writeText){
		navigator.clipboard.writeText(text).then(()=>Toast("Lista copiada"),()=>fallbackCopy(text));
	}else fallbackCopy(text);
}
function fallbackCopy(text){
	const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
	document.body.appendChild(ta);ta.focus();ta.select();
	try{document.execCommand("copy");Toast("Lista copiada")}catch(e){Toast("Copia manual: mantén pulsado el texto")}
	ta.remove();
}

/* ============================ SHARE WEEK AS IMAGE (WhatsApp) ============================ */
function ResolveVar(name,fallback){
	try{const v=getComputedStyle(document.documentElement).getPropertyValue(name).trim();return v||fallback;}
	catch(e){return fallback;}
}
function Cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function JoinNames(names){
	if(names.length===1) return names[0];
	const last=names[names.length-1];
	const head=names.slice(0,-1).join(", ");
	const conn=/^[iI]/.test(last)?" e ":" y ";
	return head+conn+last;
}
/* per-slot summary -> array of plain strings, or null if empty (mirrors SlotRows) */
function SlotSummaryLines(day,slot){
	if(!day.slots[slot]) return null;
	const cells=state.members.map(m=>({m,c:day.slots[slot][m.id]})).filter(x=>x.c);
	if(!cells.some(x=>x.c.dish||x.c.away)) return null;
	const filled=cells.filter(x=>x.c.dish&&!x.c.away);
	const allSame=filled.length===cells.length&&filled.length>0&&
		filled.every(x=>x.c.dish.trim().toLowerCase()===filled[0].c.dish.trim().toLowerCase());
	if(allSame) return [filled[0].c.dish.trim()];
	const groups=[];
	filled.forEach(x=>{
		const key=x.c.dish.trim().toLowerCase();
		let g=groups.find(s=>s.key===key);
		if(!g){g={key,dish:x.c.dish.trim(),names:[]};groups.push(g);}
		g.names.push(x.m.name);
	});
	const out=groups.map(g=>JoinNames(g.names)+": "+g.dish);
	const away=cells.filter(x=>x.c.away).map(x=>x.m.name);
	if(away.length) out.push(JoinNames(away)+": fuera de casa");
	return out;
}
function RoundRect(ctx,x,y,w,h,r){
	ctx.beginPath();ctx.moveTo(x+r,y);
	ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
	ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function RenderWeekCanvas(){
	const wk=CurWeek();
	const W=1080,P=56,cardPad=30,dayGap=20;
	const ff='"Helvetica Neue", Helvetica, Arial, sans-serif';
	const F=(w,s)=>`${w} ${s}px ${ff}`;
	const col={
		bg:ResolveVar("--bg","#F4F6F3"),card:ResolveVar("--card","#FFFFFF"),
		ink:ResolveVar("--ink","#1E2A24"),muted:ResolveVar("--muted","#6B756F"),
		line:ResolveVar("--line","#E4E9E4"),accent:ResolveVar("--aub","#2E7D5B")
	};
	const DAY_S=40,LBL_S=22,TXT_S=33,TXT_LH=44;
	const SLOTS_SHOW=["Comida","Cena"];
	const cv=document.createElement("canvas");cv.width=W;
	const ctx=cv.getContext("2d");
	const innerW=W-2*P-2*cardPad;
	const wrap=(text,maxW)=>{
		ctx.font=F(400,TXT_S);
		const words=String(text).split(" "),lines=[];let ln="";
		words.forEach(w=>{const t=ln?ln+" "+w:w;if(ctx.measureText(t).width>maxW&&ln){lines.push(ln);ln=w;}else ln=t;});
		if(ln)lines.push(ln);return lines;
	};
	/* --- measure --- */
	const dayHeadH=56,labelH=LBL_S+12,blockGap=8;
	const days=wk.days.map((d,i)=>{
		const blocks=[];
		SLOTS_SHOW.forEach(sl=>{
			const lines=SlotSummaryLines(d,sl);if(!lines)return;
			const wrapped=[];lines.forEach(t=>wrap(t,innerW-8).forEach(w=>wrapped.push(w)));
			blocks.push({label:sl.toUpperCase(),wrapped});
		});
		let contentH=dayHeadH;
		if(blocks.length) blocks.forEach(b=>{contentH+=labelH+b.wrapped.length*TXT_LH+blockGap;});
		else contentH+=TXT_LH;
		return {dow:Cap(DOW[i]),date:d.date,blocks,cardH:contentH+2*cardPad};
	});
	const headerH=190,afterHeader=34,footerH=68,bottomPad=36;
	let total=headerH+afterHeader+footerH+bottomPad;
	days.forEach(d=>{total+=d.cardH+dayGap;});
	cv.height=Math.ceil(total);
	/* --- draw (setting height reset the context) --- */
	const c=cv.getContext("2d");
	const today=TodayISO();
	c.fillStyle=col.bg;c.fillRect(0,0,W,cv.height);
	c.fillStyle=col.accent;c.fillRect(0,0,W,headerH);
	c.textBaseline="alphabetic";c.textAlign="left";
	c.fillStyle="#fff";c.font=F(800,52);c.fillText("Menú de la semana",P,92);
	c.fillStyle="rgba(255,255,255,.88)";c.font=F(500,30);
	c.fillText(FmtLong(wk.monday)+" – "+FmtLong(AddDays(wk.monday,6)),P,138);
	let y=headerH+afterHeader;
	days.forEach(d=>{
		RoundRect(c,P,y,W-2*P,d.cardH,22);
		c.fillStyle=col.card;c.fill();
		c.strokeStyle=col.line;c.lineWidth=1.5;c.stroke();
		const cx=P+cardPad;let iy=y+cardPad;
		/* day header */
		c.fillStyle=col.ink;c.font=F(800,DAY_S);
		const dl=d.dow+"  ·  "+FmtLong(d.date);
		c.fillText(dl,cx,iy+34);
		if(d.date===today){
			const w0=c.measureText(dl).width;const px=cx+w0+16;
			c.font=F(800,20);const tw=c.measureText("HOY").width;
			RoundRect(c,px,iy+8,tw+26,30,15);c.fillStyle=col.accent;c.fill();
			c.fillStyle="#fff";c.fillText("HOY",px+13,iy+30);
		}
		iy+=dayHeadH;
		if(!d.blocks.length){
			c.fillStyle=col.muted;c.font=F(400,TXT_S);
			c.fillText("Sin planificar",cx+4,iy+26);
		}else d.blocks.forEach(b=>{
			c.fillStyle=col.accent;c.font=F(800,LBL_S);
			c.fillText(b.label,cx,iy+LBL_S);
			iy+=labelH;
			c.fillStyle=col.ink;c.font=F(400,TXT_S);
			b.wrapped.forEach(line=>{c.fillText(line,cx+4,iy+26);iy+=TXT_LH;});
			iy+=blockGap;
		});
		y+=d.cardH+dayGap;
	});
	c.fillStyle=col.muted;c.font=F(500,26);c.textAlign="center";
	c.fillText("Actualizado el "+FmtLong(today),W/2,cv.height-bottomPad);
	c.textAlign="left";
	return cv;
}
function DataUrlToFile(dataUrl,name){
	const parts=dataUrl.split(",");
	const mime=(parts[0].match(/:(.*?);/)||[])[1]||"image/png";
	const bin=atob(parts[1]),u8=new Uint8Array(bin.length);
	for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
	return new File([u8],name,{type:mime});
}
function ShareWeekImage(){
	let cv,dataUrl;
	try{cv=RenderWeekCanvas();dataUrl=cv.toDataURL("image/png");}
	catch(e){return Toast("No se pudo generar la imagen");}
	const fname="menu-"+CurWeek().monday+".png";
	let file=null;
	try{file=DataUrlToFile(dataUrl,fname);}catch(e){}
	if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
		navigator.share({files:[file],title:"Menú de la semana",text:"Menú de la semana 🍽"}).catch(()=>{});
		return;
	}
	const a=document.createElement("a");a.href=dataUrl;a.download=fname;
	document.body.appendChild(a);a.click();a.remove();
	Toast("Imagen guardada — adjúntala en WhatsApp");
}

function NiceQty(n){return (Math.round(n*100)/100).toString().replace(".",",");}
function RenderShoppingCanvas(){
	const wk=CurWeek();
	const W=1080,P=56,cardPad=30;
	const ff='"Helvetica Neue", Helvetica, Arial, sans-serif';
	const F=(w,s)=>`${w} ${s}px ${ff}`;
	const col={bg:ResolveVar("--bg","#F4F6F3"),card:ResolveVar("--card","#FFFFFF"),
		ink:ResolveVar("--ink","#1E2A24"),muted:ResolveVar("--muted","#6B756F"),
		line:ResolveVar("--line","#E4E9E4"),accent:ResolveVar("--aub","#2E7D5B")};
	const items=state.produce.filter(p=>!p.done);
	const headerH=180,rowH=58,topGap=34,footerH=64,bottomPad=34,listPad=24;
	const cv=document.createElement("canvas");cv.width=W;
	const rows=items.length||1;
	const cardH=listPad*2+rows*rowH;
	cv.height=Math.ceil(headerH+topGap+cardH+footerH+bottomPad);
	const c=cv.getContext("2d");
	c.fillStyle=col.bg;c.fillRect(0,0,W,cv.height);
	c.fillStyle=col.accent;c.fillRect(0,0,W,headerH);
	c.textBaseline="alphabetic";c.textAlign="left";
	c.fillStyle="#fff";c.font=F(800,50);c.fillText("Fruta y verdura",P,86);
	c.fillStyle="rgba(255,255,255,.88)";c.font=F(500,28);
	c.fillText("Semana "+FmtLong(wk.monday)+" – "+FmtLong(AddDays(wk.monday,6)),P,128);
	let y=headerH+topGap;
	RoundRect(c,P,y,W-2*P,cardH,22);c.fillStyle=col.card;c.fill();
	c.strokeStyle=col.line;c.lineWidth=1.5;c.stroke();
	const cx=P+cardPad;let ry=y+listPad;
	if(!items.length){
		c.fillStyle=col.muted;c.font=F(400,32);c.fillText("Nada pendiente.",cx,ry+40);
	}else items.forEach((p,i)=>{
		if(i>0){c.strokeStyle=col.line;c.lineWidth=1;c.beginPath();c.moveTo(cx,ry);c.lineTo(W-P-cardPad,ry);c.stroke();}
		c.fillStyle=col.accent;c.beginPath();c.arc(cx+6,ry+rowH/2,6,0,Math.PI*2);c.fill();
		c.fillStyle=col.ink;c.font=F(600,34);c.fillText(p.name,cx+28,ry+rowH/2+12);
		const q=p.qty?(NiceQty(p.qty)+" "+(p.unit||"")).trim():"";
		if(q){c.font=F(700,32);c.fillStyle=col.accent;c.textAlign="right";c.fillText(q,W-P-cardPad,ry+rowH/2+12);c.textAlign="left";}
		ry+=rowH;
	});
	c.fillStyle=col.muted;c.font=F(500,26);c.textAlign="center";
	c.fillText("Total: "+items.length+" productos",W/2,cv.height-bottomPad);
	c.textAlign="left";
	return cv;
}
function ShareShoppingImage(){
	if(!state.produce.some(p=>!p.done)) return Toast("No hay fruta/verdura pendiente");
	let cv,dataUrl;
	try{cv=RenderShoppingCanvas();dataUrl=cv.toDataURL("image/png");}
	catch(e){return Toast("No se pudo generar la imagen");}
	const fname="frutero-"+CurWeek().monday+".png";
	let file=null;try{file=DataUrlToFile(dataUrl,fname);}catch(e){}
	if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
		navigator.share({files:[file],title:"Fruta y verdura",text:"Pedido de fruta y verdura 🍎"}).catch(()=>{});
		return;
	}
	const a=document.createElement("a");a.href=dataUrl;a.download=fname;
	document.body.appendChild(a);a.click();a.remove();
	Toast("Imagen guardada — adjúntala en WhatsApp");
}

/* ============================ EVENTS ============================ */
function Toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(Toast._t);Toast._t=setTimeout(()=>t.classList.remove("show"),1900)}
let _lastFocus = null;
function ShowSheet(){
	_lastFocus = document.activeElement;
	document.getElementById("scrim").classList.add("show");
	const sh = document.getElementById("sheet");
	sh.classList.add("show");
	sh.focus();
}
function CloseSheet(){
	document.getElementById("scrim").classList.remove("show");
	document.getElementById("sheet").classList.remove("show");
	picker=null;
	if(_lastFocus && _lastFocus.focus){ try{_lastFocus.focus()}catch(e){} }
	_lastFocus = null;
}

document.addEventListener("click",e=>{
	const t=e.target.closest("[data-action]"); if(!t) return;
	const a=t.dataset.action, ds=t.dataset;
	switch(a){
		case "view": ui.view=ds.v; Render(); break;
		case "today": { state.current=MondayOf(TodayISO()); EnsureWeek(state.current); ui.view="semana"; Render(); const td=TodayISO(); ui.collapsed[td]=false; Render(); break; }
		case "wk-prev": state.current=AddDays(state.current,-7); EnsureWeek(state.current); Save(); Render(); break;
		case "wk-next": state.current=AddDays(state.current,7); EnsureWeek(state.current); Save(); Render(); break;
		case "toggle-day": ui.collapsed[ds.date]=!ui.collapsed[ds.date]; Render(); break;
		case "pick": OpenPicker(+ds.d,ds.s,ds.m||null,ds.all==="1"); break;
		case "slot-all": OpenPicker(+ds.d,ds.s,null,true); break;
		case "surprise": Surprise(); break;
		case "menu": OpenMenu(); break;
		case "about": OpenAbout(); break;
		case "set-theme": SetTheme(ds.theme); break;
		case "close-sheet": CloseSheet(); break;
		case "export": ExportData(); break;
		case "import": document.getElementById("importFile").click(); break;
		case "new-week": NewWeek(); break;
		case "reset": ResetSeed(); break;
		case "copy-shop": CopyShop(); break;
		case "share-week": ShareWeekImage(); break;
		case "share-shop": ShareShoppingImage(); break;
		/* inventory */
		case "inv-pri": { const it=InvById(ds.id); if(it){it.pri=!it.pri; Save(); Render()} break; }
		case "inv-q": { const it=InvById(ds.id); if(it){it.qty=Math.max(0,it.qty+(+ds.dir)); Save(); Render()} break; }
		case "inv-del": { const arr=state.inventory[ds.loc]; const i=arr.findIndex(x=>x.id===ds.id); if(i>=0)arr.splice(i,1); Save(); Render(); break; }
		case "inv-add": AddPrompt({title:"Añadir a la despensa",fields:[
			{key:"name",label:"Qué",ph:"p.ej. Salmón"},
			{key:"qty",label:"Cantidad",type:"number",value:"1"},
			{key:"unit",label:"Unidad (opcional)",ph:"ud, kg, pack…"}
		],onSave:v=>{if(!v.name)return Toast("Pon un nombre");state.inventory[ds.loc].push({id:Uid(),name:v.name,qty:Math.max(0,parseInt(v.qty||"1")||1),unit:v.unit,added:TodayISO(),pri:ds.loc==="frigo"});Save();CloseSheet();Render()}}); break;
		/* produce */
		case "prod-done": { const p=state.produce.find(x=>x.id===ds.id); if(p){p.done=!p.done; Save(); Render()} break; }
		case "prod-del": { const i=state.produce.findIndex(x=>x.id===ds.id); if(i>=0)state.produce.splice(i,1); Save(); Render(); break; }
		case "prod-add": AddPrompt({title:"Añadir fruta/verdura",fields:[
			{key:"name",label:"Qué",ph:"p.ej. Manzana Golden"},
			{key:"qty",label:"Cantidad",type:"number",value:""},
			{key:"unit",label:"Unidad",ph:"ud / kg",value:"ud"}
		],onSave:v=>{if(!v.name)return Toast("Pon un nombre");const q=parseFloat(v.qty);state.produce.push({id:Uid(),name:v.name,qty:(Number.isFinite(q)&&q>0)?q:null,unit:v.unit||"ud",done:false});Save();CloseSheet();Render()}}); break;
		/* extras */
		case "ex-done": { const x=state.extras.find(z=>z.id===ds.id); if(x){x.done=!x.done; Save(); Render()} break; }
		case "ex-del": { const i=state.extras.findIndex(z=>z.id===ds.id); if(i>=0)state.extras.splice(i,1); Save(); Render(); break; }
		case "ex-add": AddPrompt({title:"Añadir a Otros",fields:[{key:"name",label:"Qué",ph:"p.ej. Papel de horno"}],onSave:v=>{if(!v.name)return;state.extras.push({id:Uid(),name:v.name,done:false});Save();CloseSheet();Render()}}); break;
		case "need-to-extra": state.extras.push({id:Uid(),name:ds.name,done:false}); Save(); Toast("Movido a Otros"); break;
		/* ideas */
		case "ideas-course": ui.ideasCourse=ds.c; ui.ideasTipo=null; Render(); break;
		case "ideas-tipo": ui.ideasTipo=ds.t||null; Render(); break;
		case "idea-del": { const i=state.catalog.findIndex(x=>x.id===ds.id); if(i>=0){ const nm=state.catalog[i].name.trim().toLowerCase(); (state.hidden=state.hidden||[]).includes(nm)||state.hidden.push(nm); state.catalog.splice(i,1); _macroIndex=null; } Save(); Render(); break; }
		case "idea-add": AddPrompt({title:"Nuevo plato",fields:[
			{key:"name",label:"Nombre del plato",ph:"p.ej. Lasaña de calabacín"},
			{key:"course",label:"Categoría",type:"select",value:ds.c,options:[
				{value:"primero",label:"Primeros"},{value:"segundo",label:"Segundos"},{value:"cena",label:"Cenas"},{value:"noah",label:"Comidas Noah"}]},
			{key:"tipo",label:"Tipo (opcional)",ph:"Pasta, Pollo, Verduras…"}
		],onSave:v=>{if(!v.name)return Toast("Pon un nombre");state.catalog.push({id:Uid(),name:v.name,course:v.course,tipo:v.tipo||null});Save();CloseSheet();ui.ideasCourse=v.course;Render()}}); break;
	}
});

/* picker-specific (data-paction) */
document.addEventListener("click",e=>{
	const t=e.target.closest("[data-paction]"); if(!t||!picker) return;
	const a=t.dataset.paction, ds=t.dataset;
	switch(a){
		case "ptoggle-all": picker.applyAll=!picker.applyAll; RenderPicker(); break;
		case "pcourse": picker.course=ds.c; picker.tipo=null; RenderPicker(); break;
		case "psub": picker.sub=ds.c; picker.tipo=null; RenderPicker(); break;
		case "pclrsub": picker[ds.c]=null; RenderPicker(); break;
		case "ptipo": picker.tipo=ds.t||null; RenderPicker(); break;
		case "pinv": { const it=InvById(ds.id); if(!it) break;
			if(picker.slot==="Comida"||picker.slot==="Cena"){ picker[picker.sub]=it.name; picker.invId=it.id; if(picker.sub==="pri")picker.sub="seg"; RenderPicker(); }
			else ApplyDish(it.name,it.id); break; }
		case "pchoose":
			if(picker.slot==="Comida"||picker.slot==="Cena"){ picker[picker.sub]=ds.name; if(picker.sub==="pri")picker.sub="seg"; RenderPicker(); }
			else ApplyDish(ds.name,null); break;
		case "psave": SaveComida(); break;
		case "paway": SetAway(); break;
		case "pclear": ClearCell(); break;
	}
});

/* search free-text commit on enter inside picker */
document.addEventListener("keydown",e=>{
	if(e.key==="Escape"&&document.getElementById("sheet").classList.contains("show")){
		CloseSheet(); return;
	}
	if(e.key==="Enter"&&picker&&document.activeElement&&document.activeElement.id==="pickSearch"){
		const v=document.activeElement.value.trim(); if(!v) return;
		if(picker.slot==="Comida"||picker.slot==="Cena"){
			picker[picker.sub]=v; picker.search="";
			if(picker.sub==="pri")picker.sub="seg";
			RenderPicker(); const s=document.getElementById("pickSearch"); if(s)s.focus();
		} else ApplyDish(v,null);
	}
});

/* ============================ INIT ============================ */
(function init(){
	if(!Load()){ state=SeedState(); }
	RefreshCatalog();                 // reference data: always from SEED
	if(!Array.isArray(state.extras)) state.extras=[];
	if(!Array.isArray(state.hidden)) state.hidden=[];
	// guarantee current week + members exist
	if(!state.current) state.current=MondayOf(TodayISO());
	if(!state.members) state.members=[{id:"nosotros",name:"Nosotros",color:"var(--m-nosotros)",factor:1},{id:"noah",name:"Noah",color:"var(--m-noah)",factor:0.6},{id:"iria",name:"Iria",color:"var(--m-iria)",factor:0.6}];
	state.members.forEach(m=>{if(typeof m.factor!=="number")m.factor=(m.id==="nosotros"?1:0.6);});
	if(!state.theme) state.theme="fresco";
	ApplyTheme();
	BuildManifest();
	EnsureWeek(state.current);
	Save(); Render();
	/* Offline: best-effort SW registration. Silently skipped on file://,
	   unsupported browsers, or when sw.js is not deployed next to the app. */
	if("serviceWorker" in navigator){
		try{navigator.serviceWorker.register("sw.js").catch(()=>{});}catch(e){}
	}
})();
</script>
