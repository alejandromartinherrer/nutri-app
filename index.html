function Uid(){return Math.random().toString(36).slice(2,9)}
/* Local YYYY-MM-DD. Never round-trip through toISOString() for date-only
   math: it converts to UTC and shifts the day in UTC+ zones (e.g. Madrid). */
function Ymd(d){
	return d.getFullYear() + "-" +
		String(d.getMonth() + 1).padStart(2, "0") + "-" +
		String(d.getDate()).padStart(2, "0");
}
function TodayISO(){return Ymd(new Date())}

function MondayOf(d){
	const dt = (d instanceof Date)? new Date(d): new Date(d+"T00:00:00");
	const wd = (dt.getDay()+6)%7;            // 0=Mon
	dt.setDate(dt.getDate()-wd);
	return Ymd(dt);
}
function AddDays(iso,n){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return Ymd(d)}
function FmtLong(iso){const d=new Date(iso+"T00:00:00");return d.getDate()+" "+["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][d.getMonth()]}

/* ---- load / save (storage is best-effort; never throws) ----
   Save() stamps updatedAt (drives cloud-sync conflict resolution: newest wins).
   SaveQuiet() skips the stamp — for boot/adopt writes that aren't user edits,
   so a mere app-open never outranks real changes made on another device. */
let _stampPaused=false;
function Save(){
	if(!_stampPaused) state.updatedAt=new Date().toISOString();
	try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){/* in-memory only */}
	if(!_stampPaused && typeof UpdateCloudDot==="function"){ UpdateCloudDot(); ScheduleAutoSync(); }
}
function SaveQuiet(){ _stampPaused=true; Save(); _stampPaused=false; }
/* Reference data (catalog) is rebuilt from SEED on every boot and never
   trusted from storage; otherwise catalog updates never reach an already
   installed user. Only user data (weeks/inventory/produce/members/theme)
   is persisted. */
function BuildCatalog(){
	return SEED.catalog.concat(REALFOODING_DISHES).map(c=>({
		id:Uid(), name:c.name, tipo:c.tipo, course:c.course,
		kcal:c.kcal, prot:c.prot, carb:c.carb, fat:c.fat,
		estilo:c.estilo, batch:!!c.batch
	}));
}
function ValidState(s){
	return !!(s && s.weeks && Array.isArray(s.members) && s.inventory &&
		s.inventory.frigo && s.inventory.conge && Array.isArray(s.produce));
}
/* Heal slots that hold a cell keyed by a non-existent member (the "null" ghost
   written by the pre-1.7.1 picker bug). If the ghost holds a dish and every real
   member is empty, the meal was meant for everyone → recover it before dropping
   the ghost, so no plan is silently lost. Returns how many ghosts were removed. */
function SanitizeSlots(s){
	if(!s||!s.weeks||!Array.isArray(s.members)) return 0;
	const ids=s.members.map(m=>m.id);
	let fixed=0;
	Object.values(s.weeks).forEach(w=>(w&&w.days||[]).forEach(d=>{
		if(!d||!d.slots) return;
		SLOTS.forEach(sl=>{
			const slot=d.slots[sl]; if(!slot) return;
			Object.keys(slot).forEach(k=>{
				if(ids.indexOf(k)>=0) return;                  // real member: keep
				const ghost=slot[k];
				const allEmpty=ids.every(id=>!slot[id]||(!slot[id].dish&&!slot[id].away));
				if(ghost&&(ghost.dish||ghost.away)&&allEmpty){
					ids.forEach(id=>{ slot[id]={dish:ghost.dish||"",invId:null,away:!!ghost.away}; });
				}
				delete slot[k]; fixed++;
			});
		});
	}));
	return fixed;
}
function Load(){
	try{
		let raw = localStorage.getItem(STORE_KEY), legacy=false;
		if(!raw){ raw = localStorage.getItem(LEGACY_STORE_KEY); legacy = !!raw; }
		if(!raw) return false;
		const s = JSON.parse(raw);
		if(!ValidState(s)) return false;   // partial/corrupt -> re-seed
		if(legacy) MigrateV1(s);           // v1 store found: upgrade in place
		SanitizeSlots(s);                  // drop phantom-member cells (pre-1.7.1 bug)
		state = s; return true;
	}catch(e){ return false; }
}
/* v1 -> v2: user-editable recipe book + fixed breakfast/snack routine.
   The v1 key is left untouched as a safety net; Save() writes to the v2 key. */
function MigrateV1(s){
	if(!Array.isArray(s.userDishes)) s.userDishes=[];
	if(!Array.isArray(s.hidden)) s.hidden=[];
	if(!Array.isArray(s.extras)) s.extras=[];
	Object.values(s.weeks||{}).forEach(w=>ApplyTemplate(w));
	return s;
}

/* ---- weekly routine: breakfasts & mid-morning snacks ----
   Editable since 1.2.0 (state.plantilla); defaults derived from SEED.week.
   ApplyTemplate only fills EMPTY cells, so manual edits and deliberate
   deletions always win over the template. */
const TEMPLATE_SLOTS = ["Desayuno","Almuerzo"];
function DefaultPlantilla(){
	const P={desayuno:[],almKids:[],almAdults:[]};
	for(let i=0;i<7;i++){
		const s=(SEED.week[i]&&SEED.week[i].slots)||{};
		P.desayuno.push((s.Desayuno&&(s.Desayuno.nosotros||s.Desayuno.noah))||"");
		P.almKids.push((s.Almuerzo&&s.Almuerzo.noah)||"");
		P.almAdults.push((s.Almuerzo&&s.Almuerzo.nosotros)||"");
	}
	return P;
}
function Plantilla(){
	const p=state&&state.plantilla;
	return (p&&Array.isArray(p.desayuno)&&p.desayuno.length===7)?p:DefaultPlantilla();
}
function TemplateDish(dow,slot,mid){
	const P=Plantilla();
	if(slot==="Desayuno") return P.desayuno[dow]||"";
	if(slot==="Almuerzo") return (mid==="nosotros"?P.almAdults[dow]:P.almKids[dow])||"";
	return "";
}
function ApplyTemplate(week){
	let n=0;
	(week.days||[]).forEach((d,i)=>TEMPLATE_SLOTS.forEach(s=>{
		if(!d.slots[s]) return;
		MEMBER_IDS.forEach(mid=>{
			const c=d.slots[s][mid];
			if(c && !c.dish && !c.away){
				const t=TemplateDish(i,s,mid);
				if(t){ c.dish=t; n++; }
			}
		});
	}));
	return n;
}

function SeedState(){
	const members = [
		{id:"nosotros",name:"Nosotros",color:"var(--m-nosotros)",factor:1},
		{id:"noah",name:"Noah",color:"var(--m-noah)",factor:0.6},
		{id:"iria",name:"Iria",color:"var(--m-iria)",factor:0.6}
	];
	const catalog = BuildCatalog();
	const today = TodayISO();
	const frigo = SEED.frigo.map(i=>({id:Uid(),name:i.name,qty:i.qty,unit:"",added:today,pri:true}));
	const conge = SEED.conge.map(i=>({id:Uid(),name:i.name,qty:i.qty,unit:"",added:today,pri:false}));
	const produce = SEED.produce.map(p=>({id:Uid(),name:p.name,qty:p.qty,unit:p.unit||"ud",done:false}));
	// build week object from seed
	const weeks = {};
	const wk = BuildWeekFromSeed(SEED.week);
	weeks[wk.monday] = wk;
	return {
		members, catalog,
		inventory:{frigo,conge},
		produce, extras:[], userDishes:[], hidden:[],
		weeks, current: wk.monday
	};
}

function BlankCell(){return {dish:"",invId:null,away:false}}

function BuildWeekFromSeed(seedWeek){
	const monday = MondayOf(seedWeek[0].date);
	const days = [];
	for(let i=0;i<7;i++){
		const date = AddDays(monday,i);
		const src = seedWeek.find(d=>d.date===date);
		const slots = {};
		SLOTS.forEach(s=>{
			slots[s] = {};
			MEMBER_IDS.forEach(m=>{
				const dish = src && src.slots[s] ? (src.slots[s][m]||"") : "";
				slots[s][m] = {dish:dish||"",invId:null,away:false};
			});
		});
		days.push({date,slots});
	}
	return {monday,days};
}

function EnsureWeek(monday){
	if(state.weeks[monday]) return state.weeks[monday];
	const days = [];
	for(let i=0;i<7;i++){
		const date = AddDays(monday,i);
		const slots = {};
		SLOTS.forEach(s=>{slots[s]={};state.members.forEach(m=>{slots[s][m.id]=BlankCell()})});
		days.push({date,slots});
	}
	state.weeks[monday] = {monday,days};
	ApplyTemplate(state.weeks[monday]);   // routine desayunos/almuerzos come pre-filled
	return state.weeks[monday];
}

function CurWeek(){return EnsureWeek(state.current)}
function Member(id){return state.members.find(m=>m.id===id)}

/* ============================ HELPERS ============================ */
function InvById(id){
	if(!id) return null;
	return state.inventory.frigo.find(i=>i.id===id)||state.inventory.conge.find(i=>i.id===id)||null;
}
function InvLoc(id){
	if(state.inventory.frigo.some(i=>i.id===id)) return "frigo";
	if(state.inventory.conge.some(i=>i.id===id)) return "conge";
	return null;
}
// distinct planned dishes this week with no inventory backing -> need shopping
function DishesNeedingShopping(){
	const wk = CurWeek();
	const all = new Map();          // key -> display name
	const covered = new Set();      // dish keys backed by any inventory link
	wk.days.forEach(d=>SLOTS.forEach(s=>{
		const slot=d.slots[s];
		state.members.forEach(m=>{
			const c=slot[m.id];
			if(c && c.dish && !c.away){
				const key=c.dish.trim().toLowerCase();
				if(!all.has(key)) all.set(key,c.dish.trim());
				if(c.invId) covered.add(key);
			}
		});
	}));
	const out=[];
	all.forEach((name,key)=>{ if(!covered.has(key)) out.push(name) });
	return out.sort((a,b)=>a.localeCompare(b,"es"));
}
function CountPlanned(){
	const wk=CurWeek(); let n=0;
	wk.days.forEach(d=>SLOTS.forEach(s=>state.members.forEach(m=>{
		const c=d.slots[s][m.id]; if(c&&(c.dish||c.away)) n++;
	})));
	return n;
}

function SlotRows(d,dayIdx,slot){
	const cells = state.members.map(m=>({m,c:d.slots[slot][m.id]}));
	const filled = cells.filter(x=>x.c.dish && !x.c.away);
	const allSame = filled.length===state.members.length &&
		filled.every(x=>x.c.dish.trim().toLowerCase()===filled[0].c.dish.trim().toLowerCase());
	let rows="";
	if(allSame){
		rows = `<div class="row-all" data-action="pick" data-d="${dayIdx}" data-s="${slot}" data-all="1">
			<span class="tag all">Todos</span>
			<span class="dish">${DishHtml(filled[0].c)}</span></div>`;
	}else{
		const parts = cells.map(({m,c})=>{
			let inner;
			if(c.away) inner=`<span class="away">🚶 Fuera de casa</span>`;
			else if(c.dish) inner=`<span class="dish">${DishHtml(c)}</span>`;
			else inner=`<span class="dish empty">+ añadir</span>`;
			return `<div class="row-m" data-action="pick" data-d="${dayIdx}" data-s="${slot}" data-m="${m.id}">
				<span class="tag m" style="background:${m.color}">${m.name}</span>${inner}</div>`;
		});
		rows = parts.join("");
	}
	return rows;
}
/* food-group colours, so a glance at the week shows what you're planning */
const TIPO_COLORS = {
	"Legumbres":"#C0872D","Verduras":"#3E8E5A","Ensaladas":"#5BA26B",
	"Sopas y cremas":"#C2792B","Pasta":"#B5843B","Arroz y cereales":"#A9803C",
	"Pescado":"#3B82A6","Marisco":"#4E9CC0","Pollo":"#C06A2E","Carne":"#9E4B3A",
	"Huevos":"#C9A227","Bowls":"#6B8E4E"
};
function TipoColor(t){ return TIPO_COLORS[t] || "#7C8A83"; }
function DishTipo(name){
	if(!name) return null;
	const k=name.trim().toLowerCase();
	const c=state.catalog.find(x=>x.name.trim().toLowerCase()===k);
	return (c&&c.tipo)||null;
}
/* distinct food groups of a (possibly composite "1º · 2º") meal */
function MealTipos(dish){
	if(!dish) return [];
	const out=[];
	dish.split(SEP).map(s=>s.trim()).filter(Boolean).forEach(p=>{
		const t=DishTipo(p); if(t && !out.includes(t)) out.push(t);
	});
	return out;
}
function TipoTags(dish){
	return MealTipos(dish).map(t=>
		`<span class="tipo-tag" style="background:${TipoColor(t)}">${escapeHtml(t)}</span>`).join("");
}
/* distinct food groups planned for a day's comida + cena (for the day header) */
function DayTipos(day){
	const out=[];
	["Comida","Cena"].forEach(s=>{ if(!day.slots[s]) return;
		state.members.forEach(m=>{ const c=day.slots[s][m.id];
			if(c&&c.dish&&!c.away) MealTipos(c.dish).forEach(t=>{ if(!out.includes(t)) out.push(t); });
		});
	});
	return out;
}
function DishHtml(c){
	let extra="";
	if(c.invId){
		const loc=InvLoc(c.invId);
		extra = loc==="frigo"?`<span class="fridge">🧊 del frigo</span>`:`<span class="frozen">❄️ del congelador</span>`;
	}
	const tags=TipoTags(c.dish);
	return escapeHtml(c.dish)+extra+(tags?`<span class="tipo-tags">${tags}</span>`:"");
}
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}

/* which meals to show in the week: desayuno/almuerzo are optional to plan */

/* ============================ RENDER: DESPENSA ============================ */
/* days until expiry (date-only ISO strings; negative = expired) */
function DaysLeft(cad){
	if(!cad) return null;
	return Math.round((Date.parse(cad)-Date.parse(TodayISO()))/86400000);
}
/* urgent = starred by hand OR expiring within 2 days */
function InvUrgent(it){
	if(!it) return false;
	if(it.pri) return true;
	const dl=DaysLeft(it.cad);
	return dl!==null && dl<=2;
}
function CadBadge(it){
	const dl=DaysLeft(it.cad);
	if(dl===null) return it.pri?'<span class="pri">usar pronto</span>':'';
	if(dl<0) return '<span class="pri cad-off">caducado</span>';
	if(dl<=2) return `<span class="pri">usar pronto · ${dl===0?"caduca hoy":dl===1?"caduca mañana":"caduca en 2 días"}</span>`;
	return (it.pri?'<span class="pri">usar pronto</span>':'')+`<span class="used"> · cad. ${FmtLong(it.cad)}</span>`;
}
function InvSection(loc,title,sub){

				${CadBadge(it)}

		</div>`;
	}).join("") : `<div class="empty-msg">Vacío. Añade lo que tengas.</div>`;
	return `<div class="sec">
		<div class="sec-h"><h3>${title}</h3><span class="sub">${sub}</span>

function UsedInvIds(){

/* ============================ RENDER: MACROS ============================ */
/* O(1) name->macros lookup. The catalog is reference data rebuilt only via
   RefreshCatalog(), which is the single invalidation point of this index. */
let _macroIndex = null;
function MacroIndex(){
	if(_macroIndex) return _macroIndex;
	_macroIndex = new Map();
	state.catalog.forEach(c=>{
		if(typeof c.kcal==="number")
			_macroIndex.set(c.name.trim().toLowerCase(),
				{kcal:c.kcal,prot:c.prot,carb:c.carb,fat:c.fat});
	});
	return _macroIndex;
}
/* catalog = (SEED upserted with state.userDishes, keyed by name) − hidden.
   A user dish whose name matches a SEED dish overrides it ("edit");
   a new name extends the catalog ("add"). SEED itself is never mutated. */
function RefreshCatalog(){
	const hidden = new Set(state.hidden||[]);
	const byName = new Map();
	BuildCatalog().forEach(c=>byName.set(c.name.trim().toLowerCase(),c));
	(state.userDishes||[]).forEach(u=>{
		if(!u || !u.name) return;
		byName.set(u.name.trim().toLowerCase(),{
			id:Uid(), name:u.name, tipo:u.tipo||null, course:u.course||"primero",
			kcal:u.kcal, prot:u.prot, carb:u.carb, fat:u.fat,
			estilo:u.estilo||null, batch:!!u.batch, receta:u.receta||null, user:true
		});
	});
	state.catalog = [...byName.values()]
		.filter(c=>!hidden.has(c.name.trim().toLowerCase()));
	_macroIndex = null;
}
/* accent/case-insensitive needle for search ("atun" must match "Atún") */
function Norm(s){return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")}

/* renaming a dish must follow it into every planned cell (composites too),
   or the week keeps the old name and its macros silently stop counting */
function RenameDishInWeeks(oldName,newName){
	const ok=oldName.trim().toLowerCase(); let n=0;
	Object.values(state.weeks||{}).forEach(w=>(w.days||[]).forEach(d=>SLOTS.forEach(sl=>{
		const slot=d.slots[sl]; if(!slot) return;
		Object.keys(slot).forEach(mid=>{
			const c=slot[mid]; if(!c||!c.dish) return;
			let hit=false;
			const parts=c.dish.split(SEP).map(p=>{
				if(p.trim().toLowerCase()===ok){hit=true;return newName;}
				return p.trim();
			});
			if(hit){c.dish=parts.join(SEP);n++;}
		});
	})));
	return n;
}

/* ---- recipe text utilities: the recipe IS the data (no duplicate store) ---- */
/* "Ingredientes (2 raciones): a, b, c.\n\n1. ..." -> {base, items[], steps} */
function RecipeParts(rec){
	if(!rec) return null;
	const i=rec.indexOf("\n\n");
	const head=(i>=0?rec.slice(0,i):rec).trim();
	const steps=i>=0?rec.slice(i+2).trim():"";
	const m=head.match(/^Ingredientes\s*(?:\(([^)]*)\))?\s*:\s*([\s\S]+)$/i);
	if(!m) return null;                        // "Sugerencia: …" -> not structured
	const items=m[2].replace(/\.\s*$/,"")
		.split(/,\s+(?![^()]*\))/)               // top-level commas only (not inside parens)
		.map(s=>s.trim()).filter(Boolean);
	return {base:m[1]||"", items, steps};
}
/* scale "250 g de lentejas" ×2 -> "500 g…"; times/temps/percentages stay put */
function ScaleQty(text,f){
	if(!f||f===1) return text;
	const FR={"½":.5,"¼":.25,"¾":.75,"⅓":1/3,"⅔":2/3};
	const fmt=n=>{
		const r=Math.round(n*100)/100;
		if(Math.abs(r-Math.round(r))<1e-9) return String(Math.round(r));
		if(Math.abs(r-.5)<1e-9) return "½"; if(Math.abs(r-.25)<1e-9) return "¼"; if(Math.abs(r-.75)<1e-9) return "¾";
		if(Math.abs(r-1.5)<1e-9) return "1½";
		return String(r).replace(".",",");
	};
	return text.replace(/(\d+(?:[.,]\d+)?|[½¼¾⅓⅔])(?!\d)(\s*(?:h\b|min\b|°C|º|%|d[ií]as?\b|noche\b))?/g,(m,num,unit)=>{
		if(unit) return m;
		const v=FR[num]!==undefined?FR[num]:parseFloat(num.replace(",","."));
		return isFinite(v)?fmt(v*f):m;
	});
}
/* shopping helper: ingredients of a planned cell (composites merge parts) */
function IngredientesDe(name){
	const parts=(name||"").split(SEP).map(s=>s.trim()).filter(Boolean);
	let out=[];
	parts.forEach(p=>{const r=RecipeParts(DishRecipe(p)); if(r) out=out.concat(r.items);});
	return out.length?out:null;
}
/* fuzzy pantry hint: does any stocked item plausibly cover this ingredient?
   Token-based (len>3), accent-insensitive. False negatives are fine by design —
   it's a hint, not a filter: if the pantry name doesn't match, it just isn't
   marked (the user accepted this trade-off). */
function PantryHas(text){
	const t=Norm(text);
	const inv=[...state.inventory.frigo,...state.inventory.conge].filter(i=>i.qty>0);
	return inv.some(i=>{const ks=Tokens(i.name); return ks.length && ks.some(k=>t.includes(k));});
}
/* distinct cooked dishes (Comida + Cena) planned this week, alpha order.
   Desayuno/Almuerzo are routine staples, handled in Fruta/verdura + Otros. */
function PlannedCookDishes(){
	const wk=CurWeek(); const seen=new Map();
	wk.days.forEach(d=>["Comida","Cena"].forEach(s=>{
		const slot=d.slots[s]; if(!slot) return;
		state.members.forEach(m=>{
			const c=slot[m.id];
			if(c && c.dish && !c.away){
				const k=c.dish.trim().toLowerCase();
				if(!seen.has(k)) seen.set(k,c.dish.trim());
			}
		});
	}));
	return [...seen.values()].sort((a,b)=>a.localeCompare(b,"es"));
}
/* sort key that drops a leading "<qty> <unit> de " so "250 g de lentejas"
   and "lentejas rojas" cluster together in the merged shopping list */
function IngSortKey(t){
	let s=Norm(t);
	s=s.replace(/^[\d.,\/½¼¾⅓⅔\s\-–—]+/,"");
	s=s.replace(/^(kg|g|mg|ml|cl|l|ud|uds|dientes?|lomos?|latas?|filetes?|rebanadas?|cdas?|cdtas?|cucharadas?|cucharaditas?|hojas?|ramas?|vasos?|pizca|manojos?|puñados?)\b\s*/,"");
	s=s.replace(/^de\s+(la\s+|el\s+|los\s+|las\s+)?/,"");
	return s.trim()||Norm(t);
}
/* all planned-dish ingredients as ONE list, deduped (accent/case-insensitive),
   clustered by ingredient noun. Dishes without a recipe are not included here
   (they're surfaced as such in the per-dish view). */
function MergedIngredients(){
	const map=new Map();
	PlannedCookDishes().forEach(n=>{
		const ing=IngredientesDe(n);
		if(ing) ing.forEach(x=>{const k=Norm(x); if(!map.has(k)) map.set(k,x);});
	});
	return [...map.values()].sort((a,b)=>IngSortKey(a).localeCompare(IngSortKey(b),"es"));
}
/* "bought" checklist, stored per week (keyed by Norm(ingredient)) so it resets
   naturally when you move to another week. Same key across dishes = tick once. */
function BoughtMap(){ return (CurWeek().bought)||{}; }
function IsBought(x){ return !!BoughtMap()[Norm(x)]; }
function ToggleBought(k){ const wk=CurWeek(); const b=wk.bought||(wk.bought={}); if(b[k]) delete b[k]; else b[k]=1; }

/* recipe text for a dish: user-written first, then the built-in recipe book */
function DishRecipe(name){
	if(!name) return null;
	const key=name.trim().toLowerCase();
	const u=(state.userDishes||[]).find(d=>d.name&&d.name.trim().toLowerCase()===key);
	if(u && u.receta) return u.receta;
	return RECETAS[key] || null;
}
function DishMacros(name){
	if(!name) return null;
	return MacroIndex().get(name.trim().toLowerCase()) || null;
}
/* a meal cell may hold "1º · 2º"; sum the macros of every recognised part */
function MealMacros(dish){
	if(!dish) return null;
	const parts=dish.split(SEP).map(s=>s.trim()).filter(Boolean);
	const t={kcal:0,prot:0,carb:0,fat:0}; let hit=false;
	parts.forEach(p=>{const m=DishMacros(p); if(m){hit=true;t.kcal+=m.kcal;t.prot+=m.prot;t.carb+=m.carb;t.fat+=m.fat;}});
	return hit?t:null;
}
function MemberWeekMacros(member){
	const wk=CurWeek(); const f=member.factor||1;
	const t={kcal:0,prot:0,carb:0,fat:0}; let counted=0,planned=0;
	wk.days.forEach(d=>["Comida","Cena"].forEach(sl=>{
		const c=d.slots[sl]&&d.slots[sl][member.id];
		if(!c||c.away||!c.dish) return;
		planned++;
		const m=MealMacros(c.dish);
		if(m){counted++;t.kcal+=m.kcal*f;t.prot+=m.prot*f;t.carb+=m.carb*f;t.fat+=m.fat*f;}
	}));
	return {t,counted,planned};
}
function RenderMacros(){
	const days=7;
	const cards=state.members.map(mem=>{
		const {t,counted,planned}=MemberWeekMacros(mem);
		const hex={nosotros:"#2F6F8F",noah:"#3E7C5A",iria:"#C2557A"}[mem.id]||"#2E7D5B";
		if(counted===0){
			return `<div class="mc-card">
				<div class="mc-top"><div class="mc-name"><span class="tag" style="background:${hex}"></span>${mem.name}</div></div>
				<div class="mc-empty">Sin platos del catálogo planificados esta semana.</div></div>`;
		}
		const dayK=Math.round(t.kcal/days);
		const pc=t.prot*4,cc=t.carb*4,fc=t.fat*9,sum=Math.max(1,pc+cc+fc);
		const pp=Math.round(pc/sum*100),cp=Math.round(cc/sum*100),fp=Math.max(0,100-pp-cp);
		const sub=mem.factor!==1?`ración ${Math.round(mem.factor*100)} %`:"por adulto";
		const mm=(color,label,val)=>`<span class="mm">
			<span class="hd"><span class="d" style="background:${color}"></span>${label} <b>${Math.round(val/days)} g/día</b></span>
			<span class="wksm">${Math.round(val)} g/semana</span>
		</span>`;
		return `<div class="mc-card">
			<div class="mc-top">
				<div class="mc-name"><span class="tag" style="background:${hex}"></span>${mem.name}</div>
				<div class="mc-sub">${sub}</div>
			</div>
			<div class="mc-kcal">${dayK}<small>kcal/día</small></div>
			<div class="mc-week">${Math.round(t.kcal).toLocaleString("es-ES")} kcal/semana · ${counted}/${planned} platos con datos</div>
			<div class="mc-bar">
				<i style="width:${pp}%;background:#4C8BB0"></i>
				<i style="width:${cp}%;background:#E0A93B"></i>
				<i style="width:${fp}%;background:#CC6666"></i>
			</div>
			<div class="mc-macros">
				${mm("#4C8BB0","Proteína",t.prot)}
				${mm("#E0A93B","Hidratos",t.carb)}
				${mm("#CC6666","Grasa",t.fat)}
			</div>
		</div>`;
	}).join("");
	return `<div class="view-title">Macros por persona</div>
		<div class="mc-note">Estimación por ración estándar (no es medición). Suma <b>comida y cena</b> del catálogo; desayunos/almuerzos rutinarios y platos escritos a mano no cuentan. «Nosotros» = por adulto; Noah e Iria al 60 %. En negrita, la media <b>por día</b> (sobre 7 días); en gris atenuado, el total <b>semanal</b>.</div>
		${cards}`;
}

/* ============================ RENDER: IDEAS ============================ */
function RenderIdeas(){
	const course = ui.ideasCourse;                       // "todos" = search everywhere
	let items = course==="todos"? state.catalog.slice() : state.catalog.filter(c=>c.course===course);
	const tipos = [...new Set(items.map(i=>i.tipo).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"es"));
	if(ui.ideasTipo) items=items.filter(i=>i.tipo===ui.ideasTipo);
	if(ui.ideasSearch){const q=Norm(ui.ideasSearch);items=items.filter(i=>Norm(i.name).includes(q))}
	items.sort((a,b)=>a.name.localeCompare(b.name,"es"));

	const tabs = ["todos","primero","segundo","cena","noah"].map(c=>
		`<button class="tab ${course===c?'on':''}" data-action="ideas-course" data-c="${c}">${COURSE_LABEL[c]}</button>`).join("");
	const chips = `<button class="fchip ${!ui.ideasTipo?'on':''}" data-action="ideas-tipo" data-t="">Todos</button>`+
		tipos.map(t=>`<button class="fchip ${ui.ideasTipo===t?'on':''}" data-action="ideas-tipo" data-t="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join("");

	const list = items.length? items.map(i=>`
		<div class="idea" data-action="idea-open" data-id="${i.id}" role="button">
			<div class="nm">${escapeHtml(i.name)}${i.user?' <span class="ued" title="Editado por ti">✎</span>':''}${DishRecipe(i.name)?' <span class="rbk" title="Con receta — toca para verla">📖</span>':''}</div>
			${course==="todos"?`<span class="ti co">${COURSE_LABEL[i.course]||i.course}</span>`:''}
			${i.tipo?`<span class="ti">${escapeHtml(i.tipo)}</span>`:''}
			<button class="del" data-action="idea-del" data-id="${i.id}">✕</button>
		</div>`).join("") : `<div class="empty-msg">Nada aquí todavía.</div>`;

	return `<div class="view-title">Ideas de comidas</div>
		<p class="hint">Tu recetario. Toca un plato para ver su receta y macros; lo que añadas aparece al planear y en “Sorpréndeme”. ${state.catalog.length} platos.</p>
		<input class="field" data-action="ideas-search" id="ideasSearch" placeholder="${course==="todos"?"Buscar en todo el recetario…":"Buscar plato…"}" value="${escapeHtml(ui.ideasSearch)}" style="margin:0 2px 12px;width:calc(100% - 4px)">
		<div class="tabs">${tabs}</div>
		<div class="fchips">${chips}</div>
		<div class="sec">
			<div class="sec-h"><h3>${COURSE_LABEL[course]}</h3><span class="sub">${items.length}</span>
				<button class="add-x" data-action="idea-add" data-c="${course==="todos"?"primero":course}">+ nuevo</button></div>
			${list}
		</div>`;
}

/* ---- dish detail sheet: macros + recipe (scalable servings) + edit ---- */
function OpenDish(id,scale){
	const d=state.catalog.find(x=>x.id===id); if(!d) return;
	const f=scale||1;
	const rec=DishRecipe(d.name);
	const rp=RecipeParts(rec);
	const m=(typeof d.kcal==="number")?d:null;
	const chips=[COURSE_LABEL[d.course]||d.course,d.tipo,d.estilo,d.batch?"Batch/Tupper":null]
		.filter(Boolean).map(t=>`<span class="fchip on" style="pointer-events:none">${escapeHtml(t)}</span>`).join(" ");
	const macros=m?`
		<div class="dm-grid">
			<div class="dm"><b>${d.kcal}</b><span>kcal</span></div>
			<div class="dm"><b>${d.prot} g</b><span>proteína</span></div>
			<div class="dm"><b>${d.carb} g</b><span>hidratos</span></div>
			<div class="dm"><b>${d.fat} g</b><span>grasa</span></div>
		</div>
		<p class="hint" style="margin:6px 2px 0">Por ración adulta estimada; niños ≈ ×0,6.</p>`
		:`<p class="hint" style="margin:6px 2px 0">Sin macros — edita el plato para añadirlas.</p>`;
	let recHtml;
	if(rp){
		const scaleChips=[1,2,4,6].map(x=>
			`<button class="fchip ${f===x?'on':''}" data-action="rec-scale" data-id="${d.id}" data-f="${x}">×${x}</button>`).join("");
		recHtml=`
			<div class="lab" style="margin-top:14px">Ingredientes${rp.base?` <span style="font-weight:600;color:var(--muted);text-transform:none">· base: ${escapeHtml(rp.base)}${f>1?` · viendo ×${f}`:""}</span>`:""}</div>
			<div class="fchips" style="padding:4px 0 8px">${scaleChips}</div>
			<div class="rec-text">${rp.items.map(x=>"• "+escapeHtml(ScaleQty(x,f))).join("\n")}</div>
			${rp.steps?`<div class="lab" style="margin-top:12px">Elaboración</div><div class="rec-text">${escapeHtml(rp.steps)}</div>`:""}`;
	}else if(rec){
		recHtml=`<div class="lab" style="margin-top:14px">Receta</div><div class="rec-text">${escapeHtml(rec)}</div>`;
	}else{
		recHtml=`<div class="lab" style="margin-top:14px">Receta</div><div class="rec-text muted">Aún sin receta. Pulsa «Editar» y escríbela una vez: quedará guardada.</div>`;
	}
	document.getElementById("sheetContent").innerHTML=`
		<div class="grip"></div>
		<div class="sheet-h"><div class="t1">${escapeHtml(d.name)}</div><div class="x" data-action="close-sheet">✕</div></div>
		<div class="sheet-body">
			<div class="fchips" style="padding:0 0 10px">${chips}</div>
			${macros}
			${recHtml}
			<div class="act-row" style="margin-top:16px">
				<button class="btn prim" data-action="idea-edit" data-id="${d.id}">✏️ Editar</button>
				<button class="btn danger" data-action="idea-del" data-id="${d.id}" data-close="1">Quitar</button>
			</div>
		</div>`;
	ShowSheet();
}

/* ---- dish editor (add + edit). Writes to state.userDishes, keyed by name. ---- */
function EditDish(dish,defCourse){
	const isEdit=!!dish;
	const orig=isEdit?dish.name:null;
	AddPrompt({title:isEdit?"Editar plato":"Nuevo plato",fields:[
		{key:"name",label:"Nombre del plato",ph:"p.ej. Lasaña de calabacín",value:isEdit?dish.name:""},
		{key:"course",label:"Categoría",type:"select",value:isEdit?dish.course:defCourse,options:[
			{value:"primero",label:"Primeros"},{value:"segundo",label:"Segundos"},{value:"cena",label:"Cenas"},{value:"noah",label:"Comidas Noah"}]},
		{key:"tipo",label:"Tipo (opcional)",ph:"Pasta, Pollo, Verduras…",value:isEdit?(dish.tipo||""):""},
		{key:"estilo",label:"Estilo (opcional)",ph:"Casero, Italiano, Asiático…",value:isEdit?(dish.estilo||""):""},
		{key:"batch",label:"¿Batch/Tupper?",type:"select",value:isEdit&&dish.batch?"1":"0",options:[{value:"0",label:"No"},{value:"1",label:"Sí"}]},
		{key:"kcal",label:"Kcal por ración",type:"number",ph:"450",value:isEdit&&typeof dish.kcal==="number"?dish.kcal:""},
		{key:"prot",label:"Proteína (g)",type:"number",ph:"25",value:isEdit&&typeof dish.prot==="number"?dish.prot:""},
		{key:"carb",label:"Hidratos (g)",type:"number",ph:"40",value:isEdit&&typeof dish.carb==="number"?dish.carb:""},
		{key:"fat",label:"Grasa (g)",type:"number",ph:"15",value:isEdit&&typeof dish.fat==="number"?dish.fat:""},
		{key:"receta",label:"Receta (ingredientes y pasos)",type:"textarea",ph:"Escríbela una vez y quedará guardada…",value:isEdit?(DishRecipe(dish.name)||""):""}
	],onSave:v=>{
		if(!v.name) return Toast("Pon un nombre");
		const num=x=>{const n=parseFloat(String(x).replace(",","."));return isFinite(n)?n:undefined};
		const u={name:v.name,course:v.course,tipo:v.tipo||null,estilo:v.estilo||null,batch:v.batch==="1",
			kcal:num(v.kcal),prot:num(v.prot),carb:num(v.carb),fat:num(v.fat),receta:v.receta||null};
		const key=v.name.trim().toLowerCase();
		const okey=orig?orig.trim().toLowerCase():null;
		state.userDishes=(state.userDishes||[]).filter(d=>{
			const k=(d.name||"").trim().toLowerCase();
			return k!==key && k!==okey;
		});
		state.userDishes.push(u);
		state.hidden=(state.hidden||[]).filter(h=>h!==key);        // resurrect if it was hidden
		if(okey && okey!==key){
			if(!state.hidden.includes(okey)) state.hidden.push(okey);  // rename: hide old SEED name
			RenameDishInWeeks(orig,v.name);                            // follow the rename into planned weeks
		}
		RefreshCatalog(); Save(); CloseSheet();
		ui.ideasCourse=v.course; Render(); Toast(isEdit?"Plato actualizado":"Plato añadido");
	}});
}

/* assign logic */
/* Valid member ids for the current picker. Guards the case that corrupted data:
   opening via "para todos" leaves picker.member null; if the user then turns the
   "Aplicar a todos" switch OFF, [null] used to be written as a phantom member
   ("null" key), so the dish silently vanished from the week. Never write to a
   member that doesn't exist — fall back to everyone (the original intent). */
function PickerTargets(){
	const ids=state.members.map(m=>m.id);
	if(!picker || picker.applyAll) return ids;
	const one=ids.filter(id=>id===picker.member);
	return one.length?one:ids;
}
function ApplyDish(dish,invId){
	const wk=CurWeek(); const slot=wk.days[picker.dayIdx].slots[picker.slot];
	const targets = PickerTargets();
	let firstInv = invId;     // only first target carries the inv link / decrement
	targets.forEach((mid,idx)=>{
		const link = (idx===0)?firstInv:null;
		slot[mid] = {dish:dish, invId:link, away:false};
	});
	if(invId){
		const it=InvById(invId);
		if(it && it.qty>0){it.qty-=1}  // consume one unit
	}
	const wasAll=picker.applyAll;
	Save(); CloseSheet(); Render();
	Toast(wasAll?"Asignado a todos":"Asignado");
}

/* ============================ SURPRISE GENERATOR ============================ */
function Surprise(){
	const wk=CurWeek();
	const byCourse = c=>state.catalog.filter(x=>x.course===c);
	const pri = byCourse("primero"), seg=byCourse("segundo"), cen=byCourse("cena"), noah=byCourse("noah");
	// inventory keyword set for prioritisation
	const invItems=[...state.inventory.frigo,...state.inventory.conge].filter(i=>i.qty>0);
	const invTokens = invItems.map(i=>({id:i.id,toks:Tokens(i.name),pri:InvUrgent(i)}));
	function invMatch(dish){
		const dt=Tokens(dish.name).concat(Tokens(dish.tipo||""));
		for(const it of invTokens){
			if(it.toks.some(t=>dt.includes(t))) return it;
		}
		return null;
	}
	function pickFor(pool,usedNames,prevTipo){
		if(!pool.length) return null;
		const cand=pool.filter(x=>!usedNames.has(x.name.toLowerCase()));
		const base=cand.length?cand:pool;
		// score: inventory match (+3, +2 extra if priority), different tipo from prev (+1), small noise
		let best=null,bestScore=-1;
		base.forEach(x=>{
			let sc=Math.random()*0.9;
			const im=invMatch(x);
			if(im){sc+=3; if(im.pri) sc+=2}
			if(prevTipo && x.tipo && x.tipo!==prevTipo) sc+=1;
			if(sc>bestScore){bestScore=sc;best=x}
		});
		return best;
	}
	const usedComida=new Set(), usedCena=new Set(), usedNoah=new Set();
	let prevCT=null, prevNT=null, prevNoahT=null;
	let filled=0;
	wk.days.forEach((d,i)=>{
		// COMIDA = 1º + 2º (family)
		fillSlot(d,"Comida",()=>{
			const p=pickFor(pri,usedComida,prevCT);
			if(p){usedComida.add(p.name.toLowerCase()); prevCT=p.tipo;}
			const s=pickFor(seg,usedComida,p?p.tipo:prevCT);
			if(s){usedComida.add(s.name.toLowerCase());}
			const chosen=[p,s].filter(Boolean);
			if(!chosen.length) return null;
			const im=(s&&invMatch(s))||(p&&invMatch(p))||null;
			return {name:chosen.map(x=>x.name).join(SEP), im};
		});
		// CENA – family (single dish)
		fillSlot(d,"Cena",()=>{
			const dish=pickFor(cen,usedCena,prevNT);
			if(!dish) return null; usedCena.add(dish.name.toLowerCase()); prevNT=dish.tipo;
			return {name:dish.name, im:invMatch(dish)};
		});
	});
	// Noah differentiation: if his column has options, give him his own comida when family comida exists
	if(noah.length){
		wk.days.forEach(d=>{
			const slot=d.slots["Comida"]; const c=slot["noah"];
			if(c && c.dish && !c.away){
				const dish=pickFor(noah,usedNoah,prevNoahT);
				if(dish){usedNoah.add(dish.name.toLowerCase());prevNoahT=dish.tipo;
					const im=invMatch(dish);
					slot["noah"]={dish:dish.name,invId:im?im.id:null,away:false};
				}
			}
		});
	}

	function fillSlot(d,slotName,producer){
		const slot=d.slots[slotName];
		// only fill if every member empty (don't overwrite manual work)
		if(state.members.some(m=>slot[m.id].dish||slot[m.id].away)) return;
		const r=producer();           // {name, im} or null
		if(!r) return;
		state.members.forEach((m,idx)=>{
			slot[m.id]={dish:r.name,invId:(idx===0&&r.im)?r.im.id:null,away:false};
		});
		filled++;
	}
	Save(); Render();
	Toast(filled?`Rellenadas ${filled} comidas (huecos vacíos) ✨`:"No había huecos vacíos que rellenar");
}
function Tokens(s){
	return (s||"").toLowerCase()
		.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
		.replace(/[^a-z0-9 ]/g," ").split(/\s+/)
		.filter(w=>w.length>3 && !["con","las","los","una","del","sin","pan"].includes(w));
}

/* ============================ CLOUD SYNC (GitHub) ============================
   "Guardar" commits data/sync.json to the app's own repo via the GitHub
   Contents API; on boot (online, non-blocking) the newest copy wins by
   updatedAt. Offline-first is untouched: sync is a layer on top, the app
   never waits for the network. The fine-grained PAT lives ONLY in its own
   localStorage key — never inside state, exports or the synced file. */
/* data lives on its own branch: saves don't rebuild Pages nor pollute main */
const GH_OWNER="alejandromartinherrer", GH_REPO="nutri-app", GH_BRANCH="data";
const GH_SYNC_PATH="data/sync.json";
const GH_TOKEN_KEY="nutri_gh_token";

function GhToken(){ try{return localStorage.getItem(GH_TOKEN_KEY)||""}catch(e){return ""} }
function SetGhToken(t){ try{ if(t) localStorage.setItem(GH_TOKEN_KEY,t); else localStorage.removeItem(GH_TOKEN_KEY); }catch(e){} }

/* UTF-8-safe base64 (chunked: state JSON can exceed the arg-spread limit) */
function B64EncodeUtf8(str){
	const bytes=new TextEncoder().encode(str); let bin="";
	for(let i=0;i<bytes.length;i+=0x8000) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+0x8000));
	return btoa(bin);
}
function B64DecodeUtf8(b64){
	const bin=atob((b64||"").replace(/\s/g,"")); const bytes=new Uint8Array(bin.length);
	for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
	return new TextDecoder().decode(bytes);
}

/* pure & testable: what gets synced. catalog is reference data (rebuilt from
   SEED + userDishes on every device) — syncing it would freeze updates. */
function BuildSyncPayload(s){
	const st={}; Object.keys(s).forEach(k=>{ if(k!=="catalog") st[k]=s[k]; });
	return {app:"nutri-app", schema:SCHEMA_VERSION, savedAt:st.updatedAt||null, state:st};
}

/* Recipes and deletions are CUMULATIVE, not week-scoped: unlike the weekly plan
   (last-write-wins is fine there), a dish added on one device must never be
   dropped just because another device saved a newer whole-state. Union them. */
function MergeRecipeBook(target, source){
	if(!source) return target;
	const byName=new Map();
	(source.userDishes||[]).forEach(d=>{ if(d&&d.name) byName.set(d.name.trim().toLowerCase(),d); });
	(target.userDishes||[]).forEach(d=>{ if(d&&d.name) byName.set(d.name.trim().toLowerCase(),d); }); // same name: keep target's version
	target.userDishes=[...byName.values()];
	target.hidden=[...new Set([...(target.hidden||[]),...(source.hidden||[])])];
	return target;
}
function RecipeBookSize(s){ return ((s&&s.userDishes)||[]).length + ((s&&s.hidden)||[]).length; }

async function CloudGet(){
	const url=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_SYNC_PATH}?ref=${GH_BRANCH}`;
	const headers={Accept:"application/vnd.github+json"};
	const tok=GhToken(); if(tok) headers.Authorization="Bearer "+tok;
	const r=await fetch(url,{headers,cache:"no-store"});
	if(r.status===404) return {payload:null,sha:null};
	if(!r.ok) throw new Error("HTTP "+r.status);
	const j=await r.json();
	return {payload:JSON.parse(B64DecodeUtf8(j.content)), sha:j.sha};
}

let _cloudBusy=false;
function SetCloudBusy(b){
	_cloudBusy=b;
	const el=document.getElementById("cloudBtn");
	if(el){ el.style.opacity=b?".45":""; el.textContent=b?"⏳":"☁️"; }
}
/* unsaved-changes indicator: edits newer than the last successful upload */
function CloudDirty(){
	return !!(state.updatedAt && (!state.lastSync || state.updatedAt>state.lastSync));
}
function UpdateCloudDot(){
	const el=document.getElementById("cloudBtn");
	if(!el) return;
	if(GhToken() && CloudDirty()) el.classList.add("dirty");
	else el.classList.remove("dirty");
}
/* auto-sync: quiet upload ~30 s after the last edit (token + online only) */
let _autoSync=null;
function ScheduleAutoSync(){
	if(!GhToken() || navigator.onLine===false) return;
	clearTimeout(_autoSync);
	_autoSync=setTimeout(()=>{ if(CloudDirty() && !_cloudBusy) CloudSave(true); },30000);
}
async function CloudSave(auto){
	if(_cloudBusy) return;
	if(!GhToken()){ if(!auto) OpenCloudSettings(); return; }
	SetCloudBusy(true);
	try{
		const {sha,payload}=await CloudGet();               // fresh sha → no lost-update
		// union the cloud's recipe book into ours so we never overwrite a recipe
		// that another device added; persist the recovered ones locally too.
		if(payload&&payload.state){
			const before=RecipeBookSize(state);
			MergeRecipeBook(state, payload.state);
			if(RecipeBookSize(state)>before){ RefreshCatalog(); SaveQuiet(); Render(); }
		}
		const body={message:"app: sync "+(state.updatedAt||TodayISO()),
			content:B64EncodeUtf8(JSON.stringify(BuildSyncPayload(state),null,1)), branch:GH_BRANCH};
		if(sha) body.sha=sha;
		const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_SYNC_PATH}`,{
			method:"PUT",
			headers:{Accept:"application/vnd.github+json",Authorization:"Bearer "+GhToken(),"Content-Type":"application/json"},
			body:JSON.stringify(body)});
		if(r.status===401||r.status===403) throw {code:"auth"};
		if(r.status===409||r.status===422) throw {code:"conflict"};
		if(!r.ok) throw new Error("HTTP "+r.status);
		state.lastSync=new Date().toISOString(); SaveQuiet();
		if(!auto) Toast("Guardado en la nube ☁️✓");
	}catch(e){
		if(auto){/* quiet: the dot stays on and the next edit reschedules */}
		else if(e&&e.code==="auth") Toast("Token no válido o caducado — Opciones → Nube");
		else if(e&&e.code==="conflict") Toast("Conflicto de guardado — reintenta");
		else Toast(navigator.onLine===false?"Sin conexión — guardado solo local":"No se pudo guardar en la nube");
	}finally{ SetCloudBusy(false); UpdateCloudDot(); }
}

/* boot pull: fire-and-forget, never blocks first paint, silent on failure */
async function CloudPullOnBoot(){
	try{
		const {payload}=await CloudGet();
		if(!payload || !payload.state || !ValidState(payload.state)) return;
		const remote=payload.state.updatedAt||payload.savedAt||"";
		if(!remote || remote<=(state.updatedAt||"")){
			// local is newer/equal for the weekly plan, BUT the cloud may hold recipes
			// this device never saw. Union them (never drop a recipe) and re-upload.
			const before=RecipeBookSize(state);
			MergeRecipeBook(state, payload.state);
			if(RecipeBookSize(state)>before){
				RefreshCatalog(); Save(); Render();            // Save() stamps → autosync pushes the union
				Toast("Recetas recuperadas de la nube ☁️");
			}
			return;
		}
		const prev=JSON.stringify(state);                      // undo slot (one level)
		const localBook={userDishes:state.userDishes,hidden:state.hidden};
		state=payload.state;
		if(!Array.isArray(state.userDishes)) state.userDishes=[];
		if(!Array.isArray(state.hidden)) state.hidden=[];
		if(!Array.isArray(state.extras)) state.extras=[];
		MergeRecipeBook(state, localBook);                     // keep local-only recipes when adopting remote
		SanitizeSlots(state);                                  // heal phantom cells coming from an old device
		state.lastSync=state.updatedAt;                        // it IS the cloud copy
		RefreshCatalog(); SaveQuiet();
		ApplyTheme(); BuildManifest();
		if(!state.current) state.current=MondayOf(TodayISO());
		EnsureWeek(state.current); Render();
		ToastAction("Actualizado desde la nube ☁️","Deshacer",()=>{
			try{
				const p=JSON.parse(prev);
				if(!ValidState(p)) return Toast("No se pudo deshacer");
				state=p; RefreshCatalog(); Save();               // stamp: local now wins
				ApplyTheme(); BuildManifest(); Render();
				Toast("Restaurada tu copia local — se subirá sola");
			}catch(e){ Toast("No se pudo deshacer"); }
		});
	}catch(e){/* offline / rate-limited → keep local, that's the contract */}
}

function OpenCloudSettings(){
	const has=!!GhToken();

function CopyShop(){
	const wk=CurWeek();
	let lines=[`🛒 Compra — semana ${FmtLong(wk.monday)} a ${FmtLong(AddDays(wk.monday,6))}`,""];
	const prod=state.produce.filter(p=>!p.done);
	if(prod.length){lines.push("🍎 Fruta y verdura");prod.forEach(p=>lines.push(`· ${p.name}${p.qty?` (${p.qty} ${p.unit||""})`:""}`));lines.push("")}
	const dishes=PlannedCookDishes();
	if(dishes.length){
		lines.push("🍳 Para los platos (lo que falta)");
		if(state.shopView==="merged"){
			MergedIngredients().filter(x=>!IsBought(x)).forEach(x=>lines.push(`· ${x}${PantryHas(x)?" (ya tienes)":""}`));
			dishes.filter(n=>!IngredientesDe(n)).forEach(n=>lines.push(`· ${n} (plato sin receta)`));
		}else{
			dishes.forEach(n=>{
				const ing=IngredientesDe(n);
				if(!ing){ lines.push(`▸ ${n} (sin receta)`); return; }
				const rem=ing.filter(x=>!IsBought(x));
				if(rem.length){ lines.push(`▸ ${n}`); rem.forEach(x=>lines.push(`   · ${x}${PantryHas(x)?" (ya tienes)":""}`)); }
			});
		}
		lines.push("");
	}
	const ex=state.extras.filter(x=>!x.done);
	if(ex.length){lines.push("📝 Otros");ex.forEach(x=>lines.push(`· ${x.name}`))}
	const text=lines.join("\n").trim();
	CopyText(text);
}
function CopyText(text){
	if(navigator.clipboard&&navigator.clipboard.writeText){
		navigator.clipboard.writeText(text).then(()=>Toast("Lista copiada"),()=>fallbackCopy(text));
	}else fallbackCopy(text);
}
function fallbackCopy(text){
	const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
	document.body.appendChild(ta);ta.focus();ta.select();
	try{document.execCommand("copy");Toast("Lista copiada")}catch(e){Toast("Copia manual: mantén pulsado el texto")}
	ta.remove();
}

/* ============================ SHARE WEEK AS IMAGE (WhatsApp) ============================ */
function ResolveVar(name,fallback){
	try{const v=getComputedStyle(document.documentElement).getPropertyValue(name).trim();return v||fallback;}
	catch(e){return fallback;}
}
function Cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function JoinNames(names){
	if(names.length===1) return names[0];
	const last=names[names.length-1];
	const head=names.slice(0,-1).join(", ");
	const conn=/^[iI]/.test(last)?" e ":" y ";
	return head+conn+last;
}
/* per-slot summary -> array of plain strings, or null if empty (mirrors SlotRows) */
function SlotSummaryLines(day,slot){
	if(!day.slots[slot]) return null;
	const cells=state.members.map(m=>({m,c:day.slots[slot][m.id]})).filter(x=>x.c);
	if(!cells.some(x=>x.c.dish||x.c.away)) return null;
	const filled=cells.filter(x=>x.c.dish&&!x.c.away);
	const allSame=filled.length===cells.length&&filled.length>0&&
		filled.every(x=>x.c.dish.trim().toLowerCase()===filled[0].c.dish.trim().toLowerCase());
	if(allSame) return [filled[0].c.dish.trim()];
	const groups=[];
	filled.forEach(x=>{
		const key=x.c.dish.trim().toLowerCase();
		let g=groups.find(s=>s.key===key);
		if(!g){g={key,dish:x.c.dish.trim(),names:[]};groups.push(g);}
		g.names.push(x.m.name);
	});
	const out=groups.map(g=>JoinNames(g.names)+": "+g.dish);
	const away=cells.filter(x=>x.c.away).map(x=>x.m.name);
	if(away.length) out.push(JoinNames(away)+": fuera de casa");
	return out;
}
function RoundRect(ctx,x,y,w,h,r){
	ctx.beginPath();ctx.moveTo(x+r,y);
	ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
	ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function RenderWeekCanvas(){
	const wk=CurWeek();
	const W=1080,P=56,cardPad=30,dayGap=20;
	const ff='"Helvetica Neue", Helvetica, Arial, sans-serif';
	const F=(w,s)=>`${w} ${s}px ${ff}`;
	const col={
		bg:ResolveVar("--bg","#F4F6F3"),card:ResolveVar("--card","#FFFFFF"),
		ink:ResolveVar("--ink","#1E2A24"),muted:ResolveVar("--muted","#6B756F"),
		line:ResolveVar("--line","#E4E9E4"),accent:ResolveVar("--aub","#2E7D5B")
	};
	const DAY_S=40,LBL_S=22,TXT_S=33,TXT_LH=44;
	const SLOTS_SHOW=["Comida","Cena"];
	const cv=document.createElement("canvas");cv.width=W;
	const ctx=cv.getContext("2d");
	const innerW=W-2*P-2*cardPad;
	const wrap=(text,maxW)=>{
		ctx.font=F(400,TXT_S);
		const words=String(text).split(" "),lines=[];let ln="";
		words.forEach(w=>{const t=ln?ln+" "+w:w;if(ctx.measureText(t).width>maxW&&ln){lines.push(ln);ln=w;}else ln=t;});
		if(ln)lines.push(ln);return lines;
	};
	/* --- measure --- */
	const dayHeadH=56,labelH=LBL_S+12,blockGap=8;
	const days=wk.days.map((d,i)=>{
		const blocks=[];
		SLOTS_SHOW.forEach(sl=>{
			const lines=SlotSummaryLines(d,sl);if(!lines)return;
			const wrapped=[];lines.forEach(t=>wrap(t,innerW-8).forEach(w=>wrapped.push(w)));
			blocks.push({label:sl.toUpperCase(),wrapped});
		});
		let contentH=dayHeadH;
		if(blocks.length) blocks.forEach(b=>{contentH+=labelH+b.wrapped.length*TXT_LH+blockGap;});
		else contentH+=TXT_LH;
		return {dow:Cap(DOW[i]),date:d.date,blocks,cardH:contentH+2*cardPad};
	});
	const headerH=190,afterHeader=34,footerH=68,bottomPad=36;
	let total=headerH+afterHeader+footerH+bottomPad;
	days.forEach(d=>{total+=d.cardH+dayGap;});
	cv.height=Math.ceil(total);
	/* --- draw (setting height reset the context) --- */
	const c=cv.getContext("2d");
	const today=TodayISO();
	c.fillStyle=col.bg;c.fillRect(0,0,W,cv.height);
	c.fillStyle=col.accent;c.fillRect(0,0,W,headerH);
	c.textBaseline="alphabetic";c.textAlign="left";
	c.fillStyle="#fff";c.font=F(800,52);c.fillText("Menú de la semana",P,92);
	c.fillStyle="rgba(255,255,255,.88)";c.font=F(500,30);
	c.fillText(FmtLong(wk.monday)+" – "+FmtLong(AddDays(wk.monday,6)),P,138);
	let y=headerH+afterHeader;
	days.forEach(d=>{
		RoundRect(c,P,y,W-2*P,d.cardH,22);
		c.fillStyle=col.card;c.fill();
		c.strokeStyle=col.line;c.lineWidth=1.5;c.stroke();
		const cx=P+cardPad;let iy=y+cardPad;
		/* day header */
		c.fillStyle=col.ink;c.font=F(800,DAY_S);
		const dl=d.dow+"  ·  "+FmtLong(d.date);
		c.fillText(dl,cx,iy+34);
		if(d.date===today){
			const w0=c.measureText(dl).width;const px=cx+w0+16;
			c.font=F(800,20);const tw=c.measureText("HOY").width;
			RoundRect(c,px,iy+8,tw+26,30,15);c.fillStyle=col.accent;c.fill();
			c.fillStyle="#fff";c.fillText("HOY",px+13,iy+30);
		}
		iy+=dayHeadH;
		if(!d.blocks.length){
			c.fillStyle=col.muted;c.font=F(400,TXT_S);
			c.fillText("Sin planificar",cx+4,iy+26);
		}else d.blocks.forEach(b=>{
			c.fillStyle=col.accent;c.font=F(800,LBL_S);
			c.fillText(b.label,cx,iy+LBL_S);
			iy+=labelH;
			c.fillStyle=col.ink;c.font=F(400,TXT_S);
			b.wrapped.forEach(line=>{c.fillText(line,cx+4,iy+26);iy+=TXT_LH;});
			iy+=blockGap;
		});
		y+=d.cardH+dayGap;
	});
	c.fillStyle=col.muted;c.font=F(500,26);c.textAlign="center";
	c.fillText("Actualizado el "+FmtLong(today),W/2,cv.height-bottomPad);
	c.textAlign="left";
	return cv;
}
function DataUrlToFile(dataUrl,name){
	const parts=dataUrl.split(",");
	const mime=(parts[0].match(/:(.*?);/)||[])[1]||"image/png";
	const bin=atob(parts[1]),u8=new Uint8Array(bin.length);
	for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
	return new File([u8],name,{type:mime});
}

function NiceQty(n){return (Math.round(n*100)/100).toString().replace(".",",");}
function RenderShoppingCanvas(){
	const wk=CurWeek();
	const W=1080,P=56,cardPad=30;
	const ff='"Helvetica Neue", Helvetica, Arial, sans-serif';
	const F=(w,s)=>`${w} ${s}px ${ff}`;
	const col={bg:ResolveVar("--bg","#F4F6F3"),card:ResolveVar("--card","#FFFFFF"),
		ink:ResolveVar("--ink","#1E2A24"),muted:ResolveVar("--muted","#6B756F"),
		line:ResolveVar("--line","#E4E9E4"),accent:ResolveVar("--aub","#2E7D5B")};
	const items=state.produce.filter(p=>!p.done);
	const headerH=180,rowH=58,topGap=34,footerH=64,bottomPad=34,listPad=24;
	const cv=document.createElement("canvas");cv.width=W;
	const rows=items.length||1;
	const cardH=listPad*2+rows*rowH;
	cv.height=Math.ceil(headerH+topGap+cardH+footerH+bottomPad);
	const c=cv.getContext("2d");
	c.fillStyle=col.bg;c.fillRect(0,0,W,cv.height);
	c.fillStyle=col.accent;c.fillRect(0,0,W,headerH);
	c.textBaseline="alphabetic";c.textAlign="left";
	c.fillStyle="#fff";c.font=F(800,50);c.fillText("Fruta y verdura",P,86);
	c.fillStyle="rgba(255,255,255,.88)";c.font=F(500,28);
	c.fillText("Semana "+FmtLong(wk.monday)+" – "+FmtLong(AddDays(wk.monday,6)),P,128);
	let y=headerH+topGap;
	RoundRect(c,P,y,W-2*P,cardH,22);c.fillStyle=col.card;c.fill();
	c.strokeStyle=col.line;c.lineWidth=1.5;c.stroke();
	const cx=P+cardPad;let ry=y+listPad;
	if(!items.length){
		c.fillStyle=col.muted;c.font=F(400,32);c.fillText("Nada pendiente.",cx,ry+40);
	}else items.forEach((p,i)=>{
		if(i>0){c.strokeStyle=col.line;c.lineWidth=1;c.beginPath();c.moveTo(cx,ry);c.lineTo(W-P-cardPad,ry);c.stroke();}
		c.fillStyle=col.accent;c.beginPath();c.arc(cx+6,ry+rowH/2,6,0,Math.PI*2);c.fill();
		c.fillStyle=col.ink;c.font=F(600,34);c.fillText(p.name,cx+28,ry+rowH/2+12);
		const q=p.qty?(NiceQty(p.qty)+" "+(p.unit||"")).trim():"";
		if(q){c.font=F(700,32);c.fillStyle=col.accent;c.textAlign="right";c.fillText(q,W-P-cardPad,ry+rowH/2+12);c.textAlign="left";}
		ry+=rowH;
	});
	c.fillStyle=col.muted;c.font=F(500,26);c.textAlign="center";
	c.fillText("Total: "+items.length+" productos",W/2,cv.height-bottomPad);
	c.textAlign="left";
	return cv;
}

	const a=document.createElement("a");a.href=dataUrl;a.download=fname;
	document.body.appendChild(a);a.click();a.remove();
	Toast("Imagen guardada — adjúntala en WhatsApp");
}

/* ============================ EVENTS ============================ */
function Toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.remove("act");t.classList.add("show");clearTimeout(Toast._t);Toast._t=setTimeout(()=>t.classList.remove("show"),1900)}
/* toast with one action button (e.g. "Deshacer"); longer-lived than Toast */
function ToastAction(msg,label,fn){
	const t=document.getElementById("toast");
	t.textContent=msg;
	const b=document.createElement("button"); b.className="t-act"; b.textContent=label;
	b.onclick=()=>{ t.classList.remove("show","act"); clearTimeout(Toast._t); fn(); };
	t.appendChild(b);
	t.classList.add("show","act");
	clearTimeout(Toast._t);
	Toast._t=setTimeout(()=>t.classList.remove("show","act"),8000);
}
let _lastFocus = null;
function ShowSheet(){
	_lastFocus = document.activeElement;
	document.getElementById("scrim").classList.add("show");
	const sh = document.getElementById("sheet");
	sh.classList.add("show");
	sh.focus();
}
function CloseSheet(){
	document.getElementById("scrim").classList.remove("show");
	document.getElementById("sheet").classList.remove("show");
	picker=null;
	if(_lastFocus && _lastFocus.focus){ try{_lastFocus.focus()}catch(e){} }
	_lastFocus = null;
}

document.addEventListener("click",e=>{
	const t=e.target.closest("[data-action]"); if(!t) return;
	const a=t.dataset.action, ds=t.dataset;
	switch(a){
		case "view": ui.view=ds.v; Render(); break;
		case "today": { state.current=MondayOf(TodayISO()); EnsureWeek(state.current); ui.view="semana"; ui.collapsed[TodayISO()]=false; Save(); Render(); break; }
		case "wk-prev": state.current=AddDays(state.current,-7); EnsureWeek(state.current); Save(); Render(); break;
		case "wk-next": state.current=AddDays(state.current,7); EnsureWeek(state.current); Save(); Render(); break;
		case "toggle-day": ui.collapsed[ds.date]=!ui.collapsed[ds.date]; Render(); break;
		case "toggle-all-days": { const wk=CurWeek();
			const anyOpen=wk.days.some(d=>!ui.collapsed[d.date]);
			wk.days.forEach(d=>ui.collapsed[d.date]=anyOpen);
			Render(); break; }
		case "toggle-desalm": state.hideDesAlm=!state.hideDesAlm; SaveQuiet(); Render();
			Toast(state.hideDesAlm?"Desayuno y almuerzo ocultos":"Mostrando todas las comidas"); break;
		case "pick": OpenPicker(+ds.d,ds.s,ds.m||null,ds.all==="1"); break;
		case "slot-all": OpenPicker(+ds.d,ds.s,null,true); break;
		case "surprise": Surprise(); break;
		case "menu": OpenMenu(); break;
		case "about": OpenAbout(); break;
		case "menu-rutina": OpenRutina(); break;
		case "rutina-save": {
			const val=id=>{const el=document.getElementById(id);return el?el.value.trim():""};
			const P={desayuno:[],almKids:[],almAdults:[]};
			for(let i=0;i<7;i++){P.desayuno.push(val("rt_d_"+i));P.almKids.push(val("rt_k_"+i));P.almAdults.push(val("rt_a_"+i));}
			state.plantilla=P;
			const n=ApplyTemplate(CurWeek());
			Save(); CloseSheet(); Render();
			Toast(n?`Rutina guardada — ${n} huecos rellenados`:"Rutina guardada");
			break; }
		case "rutina-reset": state.plantilla=null; Save(); OpenRutina(); Toast("Rutina original restaurada"); break;
		case "shop-view": state.shopView=ds.v; SaveQuiet(); Render(); break;
		case "shop-check": ToggleBought(ds.k); Save(); Render(); break;
		case "shop-clear": { const wk=CurWeek(); wk.bought={}; Save(); Render(); Toast("Comprados desmarcados"); break; }
		case "shop-toggle": ui.shopClosed=ui.shopClosed||{}; ui.shopClosed[ds.name]=!ui.shopClosed[ds.name]; Render(); break;
		case "shop-toggle-all": { ui.shopClosed=ui.shopClosed||{}; const dl=PlannedCookDishes(); const anyOpen=dl.some(n=>!ui.shopClosed[n]); dl.forEach(n=>ui.shopClosed[n]=anyOpen); Render(); break; }
		case "rec-scale": { const sb=document.querySelector(".sheet-body"); const st=sb?sb.scrollTop:0;
			OpenDish(ds.id, parseInt(ds.f,10)||1);
			const sb2=document.querySelector(".sheet-body"); if(sb2) sb2.scrollTop=st; break; }
		case "cloud-save": CloudSave(); break;
		case "cloud-save-menu": CloseSheet(); CloudSave(); break;
		case "cloud-settings": OpenCloudSettings(); break;
		case "cloud-token-save": { const v=(document.getElementById("ghTokenInput")||{}).value||"";
			if(!v.trim()) return Toast("Pega el token primero");
			SetGhToken(v.trim()); CloseSheet(); Toast("Token guardado — ya puedes usar ☁️"); break; }
		case "cloud-forget": SetGhToken(""); CloseSheet(); Toast("Token borrado de este dispositivo"); break;
		case "set-theme": SetTheme(ds.theme); break;
		case "close-sheet": CloseSheet(); break;
		case "export": ExportData(); break;
		case "import": document.getElementById("importFile").click(); break;
		case "new-week": NewWeek(); break;
		case "reset": ResetSeed(); break;
		case "copy-shop": CopyShop(); break;
		case "share-week": ShareWeekImage(); break;
		case "share-shop": ShareShoppingImage(); break;
		/* inventory */
		case "inv-pri": { const it=InvById(ds.id); if(it){it.pri=!it.pri; Save(); Render()} break; }
		case "inv-q": { const it=InvById(ds.id); if(it){it.qty=Math.max(0,it.qty+(+ds.dir)); Save(); Render()} break; }
		case "inv-del": { const arr=state.inventory[ds.loc]; const i=arr.findIndex(x=>x.id===ds.id); if(i>=0)arr.splice(i,1); Save(); Render(); break; }
		case "inv-add": AddPrompt({title:"Añadir a la despensa",fields:[
			{key:"name",label:"Qué",ph:"p.ej. Salmón"},
			{key:"qty",label:"Cantidad",type:"number",value:"1"},
			{key:"unit",label:"Unidad (opcional)",ph:"ud, kg, pack…"},
			{key:"cad",label:"Caducidad (opcional)",type:"date"}
		],onSave:v=>{if(!v.name)return Toast("Pon un nombre");state.inventory[ds.loc].push({id:Uid(),name:v.name,qty:Math.max(0,parseInt(v.qty||"1")||1),unit:v.unit,cad:v.cad||null,added:TodayISO(),pri:ds.loc==="frigo"});Save();CloseSheet();Render()}}); break;
		case "inv-edit": { const it=InvById(ds.id); if(!it) break;
			AddPrompt({title:"Editar «"+it.name+"»",fields:[
				{key:"name",label:"Qué",value:it.name},
				{key:"qty",label:"Cantidad",type:"number",value:it.qty},
				{key:"unit",label:"Unidad (opcional)",ph:"ud, kg, pack…",value:it.unit||""},
				{key:"cad",label:"Caducidad (opcional)",type:"date",value:it.cad||""}
			],onSave:v=>{if(!v.name)return Toast("Pon un nombre");
				it.name=v.name; it.qty=Math.max(0,parseInt(v.qty||"1")||1); it.unit=v.unit; it.cad=v.cad||null;
				Save();CloseSheet();Render();Toast("Actualizado")}}); break; }
		/* produce */
		case "prod-done": { const p=state.produce.find(x=>x.id===ds.id); if(p){p.done=!p.done; Save(); Render()} break; }
		case "prod-del": { const i=state.produce.findIndex(x=>x.id===ds.id); if(i>=0)state.produce.splice(i,1); Save(); Render(); break; }
		case "prod-add": AddPrompt({title:"Añadir fruta/verdura",fields:[
			{key:"name",label:"Qué",ph:"p.ej. Manzana Golden"},
			{key:"qty",label:"Cantidad",type:"number",value:""},
			{key:"unit",label:"Unidad",ph:"ud / kg",value:"ud"}
		],onSave:v=>{if(!v.name)return Toast("Pon un nombre");const q=parseFloat(v.qty);state.produce.push({id:Uid(),name:v.name,qty:(Number.isFinite(q)&&q>0)?q:null,unit:v.unit||"ud",done:false});Save();CloseSheet();Render()}}); break;
		/* extras */
		case "ex-done": { const x=state.extras.find(z=>z.id===ds.id); if(x){x.done=!x.done; Save(); Render()} break; }
		case "ex-del": { const i=state.extras.findIndex(z=>z.id===ds.id); if(i>=0)state.extras.splice(i,1); Save(); Render(); break; }
		case "ex-add": AddPrompt({title:"Añadir a Otros",fields:[{key:"name",label:"Qué",ph:"p.ej. Papel de horno"}],onSave:v=>{if(!v.name)return;state.extras.push({id:Uid(),name:v.name,done:false});Save();CloseSheet();Render()}}); break;
		case "need-to-extra": state.extras.push({id:Uid(),name:ds.name,done:false}); Save(); Toast("Movido a Otros"); break;
		/* ideas */
		case "ideas-course": ui.ideasCourse=ds.c; ui.ideasTipo=null; Render(); break;
		case "ideas-tipo": ui.ideasTipo=ds.t||null; Render(); break;
		case "idea-open": OpenDish(ds.id); break;
		case "idea-edit": { const d=state.catalog.find(x=>x.id===ds.id); if(d) EditDish(d,d.course); break; }
		case "idea-del": { const d=state.catalog.find(x=>x.id===ds.id);
			if(d){ const nm=d.name.trim().toLowerCase();
				(state.hidden=state.hidden||[]).includes(nm)||state.hidden.push(nm);
				state.userDishes=(state.userDishes||[]).filter(x=>(x.name||"").trim().toLowerCase()!==nm);
				RefreshCatalog(); }
			Save(); if(ds.close) CloseSheet(); Render(); Toast("Plato quitado del recetario"); break; }
		case "idea-add": EditDish(null, ds.c||"primero"); break;
	}
});

/* picker-specific (data-paction) */
document.addEventListener("click",e=>{
	const t=e.target.closest("[data-paction]"); if(!t||!picker) return;
	const a=t.dataset.paction, ds=t.dataset;
	switch(a){
		case "ptoggle-all": picker.applyAll=!picker.applyAll;
			// turning it off with no member (opened via "para todos") must pick a real one
			if(!picker.applyAll && !state.members.some(m=>m.id===picker.member)) picker.member=state.members[0].id;
			RenderPicker(); break;
		case "pcourse": picker.course=ds.c; picker.tipo=null; RenderPicker(); break;
		case "psub": picker.sub=ds.c; picker.tipo=null; RenderPicker(); break;
		case "pclrsub": picker[ds.c]=null; RenderPicker(); break;
		case "ptipo": picker.tipo=ds.t||null; RenderPicker(); break;
		case "pall": picker.all=ds.v==="1"; picker.tipo=null; RenderPicker(); break;
		case "pinv": { const it=InvById(ds.id); if(!it) break;
			if(picker.slot==="Comida"||picker.slot==="Cena"){ picker[picker.sub]=it.name; picker.invId=it.id; if(picker.sub==="pri")picker.sub="seg"; RenderPicker(); }
			else ApplyDish(it.name,it.id); break; }
		case "pchoose":
			if(picker.slot==="Comida"||picker.slot==="Cena"){ picker[picker.sub]=ds.name; if(picker.sub==="pri")picker.sub="seg"; RenderPicker(); }
			else ApplyDish(ds.name,null); break;
		case "pfree":   // free text: same as choosing, but clears the search box
			if(picker.slot==="Comida"||picker.slot==="Cena"){ picker[picker.sub]=ds.name; picker.search=""; if(picker.sub==="pri")picker.sub="seg"; RenderPicker(); }
			else ApplyDish(ds.name,null); break;
		case "psave": SaveComida(); break;
		case "paway": SetAway(); break;
		case "pclear": ClearCell(); break;
	}
});

/* search free-text commit on enter inside picker */
document.addEventListener("keydown",e=>{
	if(e.key==="Escape"&&document.getElementById("sheet").classList.contains("show")){
		CloseSheet(); return;
	}
	if(e.key==="Enter"&&picker&&document.activeElement&&document.activeElement.id==="pickSearch"){
		const v=document.activeElement.value.trim(); if(!v) return;
		if(picker.slot==="Comida"||picker.slot==="Cena"){
			picker[picker.sub]=v; picker.search="";
			if(picker.sub==="pri")picker.sub="seg";
			RenderPicker(); const s=document.getElementById("pickSearch"); if(s)s.focus();
		} else ApplyDish(v,null);
	}
});

/* ============================ INIT ============================ */
(function init(){
	if(!Load()){ state=SeedState(); }
	if(!Array.isArray(state.extras)) state.extras=[];
	if(!Array.isArray(state.hidden)) state.hidden=[];
	if(!Array.isArray(state.userDishes)) state.userDishes=[];
	RefreshCatalog();                 // reference data: SEED + userDishes − hidden
	// guarantee current week + members exist
	if(!state.current) state.current=MondayOf(TodayISO());
	if(!state.members) state.members=[{id:"nosotros",name:"Nosotros",color:"var(--m-nosotros)",factor:1},{id:"noah",name:"Noah",color:"var(--m-noah)",factor:0.6},{id:"iria",name:"Iria",color:"var(--m-iria)",factor:0.6}];
	state.members.forEach(m=>{if(typeof m.factor!=="number")m.factor=(m.id==="nosotros"?1:0.6);});
	if(!state.theme) state.theme="fresco";
	ApplyTheme();
	BuildManifest();
	EnsureWeek(state.current);
	SaveQuiet(); Render();
	CloudPullOnBoot();               // async, never blocks offline start
	/* Offline: best-effort SW registration. Silently skipped on file://,
	   unsupported browsers, or when sw.js is not deployed next to the app. */
	if("serviceWorker" in navigator){
		try{navigator.serviceWorker.register("sw.js").catch(()=>{});}catch(e){}
	}
})();
</script>
